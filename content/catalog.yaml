# ── Nota curatorial (single body; the generator paginates dynamically) ─
nota_curatorial:
  titulo: "Sobre esta colección y el museo que no existe"
  body: >-
    En 1994, Roger Chartier formuló una observación que con el tiempo se
    volvió incómoda: la tasa de sobrevida de un impreso es inversamente
    proporcional a la importancia de su producción (Chartier, R., 2006). 
    Dicho de otro modo, cuanto más se imprimió y más manos pasó,
    menos posibilidades tuvo de llegar hasta nosotros. Los objetos que
    una cultura considera valiosos los guarda; los que considera menores
    o utilitarios los consume hasta agotarlos. Esta colección existe, en
    buena medida, para poner en cuestión ese mecanismo de selección.

    Las piezas reunidas en este catálogo pertenecen a la historia del
    diseño gráfico latinoamericano. Pertenecen a ella no como objetos
    marginales o curiosidades de época, sino como documentos centrales
    de una práctica que organizó la vida cotidiana, construyó identidades
    colectivas, hizo circular ideas y configuró maneras de ver durante
    siglos. Sin embargo, ninguna de estas piezas forma parte de una
    colección museística permanente dedicada específicamente al diseño
    gráfico latinoamericano. La razón es simple y es también el problema
    que este proyecto intenta nombrar: esa colección no existe.

    Siguiendo esta linea, el ensayista e investigador argentino Gustavo Valdés de León señaló
    que el diseño latinoamericano carece todavía de una historia escrita
    sistemática (Valdés de León, G., 2008). Sus objetos han sido
    clasificados de maneras que les restan especificidad: como arte,
    como artesanía, como patrimonio histórico, como documento de época.
    Rara vez como diseño. Esta operación clasificatoria no es inocente.
    Al desplazar un objeto de la categoría de diseño a la de arte
    precolombino, por ejemplo, se lo traslada de un campo de análisis
    funcional y proyectual a uno de contemplación estética, vaciándolo
    de la trama social que le dio origen, uso y sentido (Valdés de León,
    2008). El resultado es una historia del diseño latinoamericano
    que en los grandes libros de referencia internacional casi no existe:
    en la obra de Philip B. Meggs, con cerca de novecientas entradas en
    su índice, apenas media docena refieren a autores latinoamericanos
    (Valdés de León, 2008).

    Este catálogo propone un ejercicio de restitución. No pretende
    construir esa historia que falta, tarea que requeriría esfuerzos
    colectivos y programas de investigación de largo plazo (Valdés de
    León, 2008). Pretende algo más acotado y más concreto:
    aplicar a un conjunto de objetos seleccionados el tratamiento
    formal que merecen. Las fichas que componen esta colección utilizan
    los mismos criterios descriptivos que cualquier museo utilizaría
    para documentar una pintura del siglo XVIII o una escultura
    colonial: técnica, materiales, procedencia, estado de
    conservación, notas curatoriales, bibliografía de referencia.

    La decisión de aplicar ese sistema a una página de libro tipográfico
    de 1766, a una filigranade papel de procedencia incierta,
    a la arquitectura editorial de una revista de 1902, o a una tabla cronológica familiar en un almanaque de 1917, es, en sí misma, una toma de posición. Afirma
    que estos objetos son dignos del mismo rigor analítico y del mismo
    cuidado documental que cualquier otra expresión de la cultura
    material de su tiempo.

    La colección combina un eje cronológico —de los primeros impresos coloniales a las primeras décadas del siglo XXI— con algunas salas de organización temática, cuyos períodos en consecuencia se superponen.
    Este recorte no implica una jerarquía: no se afirma que los objetos
    más antiguos sean más importantes que los más recientes, ni que
    Buenos Aires sea el centro desde el cual deba leerse el diseño
    latinoamericano (Valdés de León, 2008). El recorte responde
    exclusivamente a los textos que fundamentan el trabajo curatorial y
    que se detallan en la bibliografía de referencia al final de este
    volumen.

    Una aclaración que el rigor exige: el museo que respalda este
    catálogo no existe. No hay una institución, una sede, una sala ni un
    número de inventario real detrás de estas páginas. Lo que existe es
    la pregunta de por qué no existe.

    Esa pregunta no se formula aquí de manera retórica ni como gesto
    irónico. Se formula con seriedad, con el convencimiento de que
    nombrar una ausencia es el primer paso para que deje de serlo. El
    diseño gráfico latinoamericano tiene una historia larga, compleja,
    híbrida y en gran parte invisibilizada (Valdés de León, 2008). Tiene
    objetos que merecen ser conservados, estudiados y exhibidos. Tiene
    una genealogía formal que no comienza con la llegada de las
    vanguardias europeas ni con la institucionalización universitaria de
    la disciplina, sino mucho antes, en talleres coloniales con tipos
    desgastados (Ares, F., 2009), en pliegos que nadie guardó (Mosqueda,
    2012), en filigranas de papel cuyo molino de origen todavía no hemos
    podido identificar (Silverman & Garone Gravier, 2021).

    Este catálogo es una propuesta de cómo podría empezar a verse esa
    historia. Nada más, y nada menos.

    Las piezas de esta colección han sido documentadas a partir de fuentes académicas especializadas en historia del diseño gráfico, la tipografía y la cultura impresa latinoamericana. Las imágenes que
    acompañan cada ficha corresponden a reproducciones de los originales
    o de sus facsímiles, obtenidas de archivos públicos, repositorios
    digitales y publicaciones académicas de referencia.

# ── Índice (entradas auto-derived from salas below) ───────────────────
indice:
  titulo: "Índice"

# ── Salas ──────────────────────────────────────────────────────────────
# Each sala has a portadilla and a list of piezas. Each pieza becomes
# two pages (imagen on the left, texto on the right).
salas:

  # ── Sala I ─────────────────────────────────────────────────
  - romano: "I"
    portadilla:
      nombre: "Imprenta y palabra en el Virreinato"
      periodo: "1764-1809"
      cita_curatorial: >-
        Durante casi medio siglo funcionó una sola imprenta a la vez en el 
        Río de la Plata: la jesuítica de Córdoba (1764) y luego la Real 
        Imprenta de Niños Expósitos. De esos talleres salieron el primer 
        libro impreso del país —el Laudationes Quinque (1766)— y los 
        primeros periódicos, con tipos importados, gastados y nunca conservados.
    piezas:
      - imagen:
          tipo: "Libro impreso colonial"
          titulo: "Laudationes Quinque (ejemplar único de la Abadía de Montserrat)"
          autor: "Atribuido a Josep Manuel Peramàs; impreso por el P. Pablo Karer"
          datos: "1766 · Córdoba, Argentina"
          images: [L001.jpg]
        texto:
          descripcion: >-
            Primer libro impreso íntegramente en territorio rioplatense,
            producido por la imprenta jesuítica instalada en el Colegio de
            Monserrat de Córdoba a mediados del siglo XVIII. La obra reúne cinco
            panegíricos en latín dedicados a Ignacio Duarte y Quirós, fundador
            del colegio, y constituye un testimonio excepcional de la
            sofisticación tipográfica alcanzada en una imprenta periférica del
            imperio español. Tras la expulsión de los jesuitas en 1767 la
            imprenta fue desmantelada, y solo un ejemplar de esta edición
            sobrevive hoy en la Abadía de Montserrat (Cataluña), donde fue
            localizado en 2019 por Silverman y Garone Gravier. Los dos
            ejemplares que habían pertenecido a Córdoba —uno en el Colegio
            Monserrat, otro entre los franciscanos— desaparecieron sin rastro;
            el del Museo Mitre fue robado y reemplazado por un facsímil; el de
            la Biblioteca Nacional de Chile no aparece disponible.
          cita_textual: >-
            primer libro impreso en la ciudad de Córdoba (1766) durante el
            periodo colonial
          estado: "Único ejemplar conocido (Biblioteca de la Abadía de Montserrat, Cataluña)"

      - imagen:
          tipo: "Composición tipográfica / arquitectura de página"
          titulo: "Página interior del Laudationes Quinque"
          autor: "P. Pablo Karer (impresor)"
          datos: "1766 · Córdoba, Argentina"
          images: [L002.png]
        texto:
          descripcion: >-
            Página interior del Laudationes Quinque, primer libro impreso
            íntegramente en territorio rioplatense. La composición revela una
            sofisticación inesperada para un taller de tan corta vida: las
            páginas dedicatorias siguen una proporción áurea (caja de 178 × 111
            mm) con márgenes iguales superior e inferior, según los preceptos de
            Alonso Víctor de Paredes; las páginas del prólogo y las laudaciones
            adoptan en cambio un rectángulo raíz de dos, manteniendo la regla de
            duplicar el margen exterior respecto del interior. El registro entre
            recto y verso es prácticamente perfecto, dato imposible de notar en
            el facsímil de 1937. Las imágenes en alta resolución obtenidas en
            2019 permiten estudiar por primera vez la composición y el detalle
            ornamental del libro, evidenciando que su impresor —probablemente
            con experiencia previa— operaba con criterios proyectuales
            explícitos.
          cita_textual: >-
            verificamos proporciones áureas, una tradición compositiva de la
            imprenta manual que se remonta a los tiempos de Gutenberg
          estado: "Conservada en el único ejemplar conocido (Montserrat)"

      - imagen:
          tipo: "Conjunto de tipos móviles"
          titulo: "Tipos Garamond del Laudationes Quinque"
          autor: "Punzonista no identificado (estilo Claude Garamond, c. 1530)"
          datos: "Antes de 1766 · Origen incierto, Probablemente Francia, Países Bajos o España"
          images:
            - {file: L003.png,   slot: [1, 1.5, 6, 4]}
            - {file: L003-1.png, slot: [1, 5.5, 6, 4]}
        texto:
          descripcion: >-
            Letras de imprenta usadas para la composición del primer libro
            impreso en Córdoba, identificadas por Silverman y Garone Gravier
            como del estilo Garamond, comparables con la muestra de Conrad
            Berner de 1592, considerada la más fiel al diseño original del
            tipógrafo francés. El conjunto incluía un Texto gordo (c. 16 pt)
            para el prólogo, una Parangona chica (18 pt) para las felicitaciones
            y un Texto (14 pt) para las laudaciones. Los tipos no estaban
            gastados, lo que sugiere fundición reciente al momento del impreso,
            pero su llegada al taller cordobés —vía la Compañía de Jesús, no por
            los circuitos comerciales habituales— es imposible de reconstruir
            con precisión. Un detalle inquietante para el archivo: ni los
            punzones, ni las matrices, ni un solo tipo físico del taller
            cordobés sobrevivió a la expulsión jesuítica.
          cita_textual: >-
            las letras podían caracterizarse como una letra de estilo Garamond,
            dato que se cotejó con distintas muestras de letra
          estado: "Documentada únicamente por la huella sobre el papel del único ejemplar conocido"

      - imagen:
          tipo: "Filigrana / marca de agua"
          titulo: "Filigrana del papel del Laudationes Quinque"
          autor: "Molino papelero europeo (no identificado con certeza)"
          datos: "c. 1760 · Capellades, La Riba, Valencia o Génova, Italia o España (origen probable)"
          images: [L004.png]
        texto:
          descripcion: >-
            Marca de agua identificable en el papel utilizado para la edición
            del Laudationes Quinque, único impreso conservado de la imprenta
            jesuítica de Córdoba. La filigrana —rasgo identitario del molino que
            produjo el papel y, probablemente, del comercio que lo distribuyó
            hasta el Río de la Plata— fue reconstruida por Silverman y Garone
            Gravier mediante fotomontaje a partir de varias fotografías del
            ejemplar conocido. Representa a un caballero con lanza montando un
            caballo, motivo conocido como 'rejoneador', muy difundido en el
            mundo hispánico entre mediados del siglo XVIII y el primer cuarto
            del XIX. Los molinos que producían este tipo de papel se encontraban
            en el sur de Europa, lo que confirma la dependencia material
            absoluta de las primeras imprentas americanas respecto de los
            circuitos comerciales transatlánticos.
          cita_textual: >-
            se modificó el brillo y contraste de las imágenes y se realizó un
            fotomontaje para reconstruir el diseño del modo más completo posible
          estado: "Reconstruida por fotomontaje a partir del único ejemplar conocido"

      - imagen:
          tipo: "Impresos educativos y religiosos"
          titulo: "Catones, cartillas y catecismos virreinales"
          autor: "Real Imprenta de Niños Expósitos (con licencias eclesiásticas)"
          datos: "1780-1810 · Buenos Aires, Argentina"
          images: [L005.jpg, L005-1.jpg, L005-2.jpg]
        texto:
          descripcion: >-
            Material escolar y catequístico producido en serie por la Real
            Imprenta de Niños Expósitos para abastecer al virreinato. Cuando se
            otorgó la concesión a Silva y Aguiar en 1780, una de las condiciones
            del contrato fue la recolección obligatoria de todos los catones,
            cartillas y catecismos en circulación, para luego venderse por
            cuenta de la Casa de Expósitos. Esa operación —combinación de
            censura, monopolio fiscal y alfabetización— produjo durante tres
            décadas los textos con los que aprendieron a leer las primeras
            generaciones porteñas. Los impresos eran baratos, mal compuestos por
            la urgencia y descuidados en la lectura; pocos sobrevivieron. Importan no por su excepcionalidad gráfica sino por lo contrario. Son el grueso silencioso de una producción que casi nadie pensó digno de conservar y que, sin embargo, fue lo más leído del virreinato.
          cita_textual: >-
            sus cartillas y catones educaron a los más jóvenes, sus obras de
            corte litúrgico instruyeron en la fe religiosa
          estado: "Ejemplares dispersos; mayor parte perdida"

      - imagen:
          tipo: "Prensa tipográfica manual / objeto industrial"
          titulo: "Prensa de hierro de la 'Imprenta de la Patria' (Museo del Vino de Cafayate)"
          autor: "Manufactura indeterminada (siglo XIX)"
          datos: "siglo XIX (no s. XVIII como suele atribuirse) · Cafayate, Salta, Argentina"
          images: [L006.jpeg]
        texto:
          descripcion: >-
            Prensa tipográfica manual conocida popularmente como 'Imprenta de la
            Patria'. Durante más de ocho décadas se sostuvo que era la prensa
            traída por los jesuitas al Colegio de Monserrat en 1764, trasladada
            a Buenos Aires por el virrey Vértiz en 1780 para fundar la Real
            Imprenta de Niños Expósitos y enviada finalmente a Salta en 1824.
            Sin embargo, en el siglo XVIII no existían aún las prensas de
            hierro, lo que vuelve materialmente imposible la atribución
            original. La pieza condensa así una doble condición de ausencia: la
            del objeto efectivamente fundacional —perdido o nunca conservado— y
            la del relato que durante décadas la nombró como tal. Permanece como
            uno de los pocos restos físicos vinculados a la primera imprenta
            porteña, y como testimonio de los modos en que el patrimonio gráfico
            latinoamericano se construye también a partir de atribuciones
            inciertas.
          cita_textual: >-
            Apenas podemos encontrar una prensa de hierro —que según los
            historiadores salteños fue la primera del taller de Expósitos
          estado: "Conservada (Museo del Vino de Cafayate, Salta); atribución material descartada"

      - imagen:
          tipo: "Periódico fundacional"
          titulo: "El Telégrafo Mercantil, Rural, Político, Económico e Historiográfico"
          autor: "Francisco Antonio Cabello y Mesa (editor)"
          datos: "1801-1802 · Buenos Aires, Argentina"
          images: [L007.jpg]
        texto:
          descripcion: >-
            Primer periódico publicado en Buenos Aires. Apareció el 1 de abril
            de 1801 bajo la dirección del peruano Cabello y Mesa, con formato de
            pliego en cuartos de aparición semanal y una tirada que alcanzó los
            110 números antes de su cierre por orden virreinal en octubre de
            1802. Sus colaboradores fueron los protagonistas del clima ilustrado
            prerevolucionario: Manuel Belgrano, Domingo de Azcuénaga, Manuel
            José de Lavardén, Juan José Castelli. El periódico inauguró en
            Buenos Aires el debate público impreso sobre economía, agricultura,
            educación y derechos —exactamente los temas que cinco años después
            se convertirían en agenda revolucionaria. Marca el primer momento en que la imprenta porteña dejó de servir sólo al virreinato y a la Iglesia y empezó a producir un espacio de opinión pública.
          cita_textual: >-
            El Telégrafo Mercantil, Rural, Político, Económico e
            Historiográfico, de Francisco Antonio Cabello y Mesa
          estado: "Conservada (Biblioteca Nacional Argentina, hemerotecas)"

      - imagen:
          tipo: "Periódico ilustrado de tema económico"
          titulo: "Semanario de Agricultura, Industria y Comercio"
          autor: "Juan Hipólito Vieytes (editor)"
          datos: "1802-1807 · Buenos Aires, Argentina"
          images: [L008.jpg]
        texto:
          descripcion: >-
            Periódico semanal fundado por Juan Hipólito Vieytes en septiembre de
            1802 y publicado durante cinco años, hasta su interrupción
            definitiva por las Invasiones Inglesas. Alcanzó 218 números, lo que
            lo convierte en la publicación periódica de mayor continuidad del
            período colonial rioplatense. Difundió ideas iluministas avanzadas:
            fisiocracia, libre comercio, integración indígena, supresión del
            comercio de esclavos, educación de las masas, asistencia social.
            Cuando llegó la escasez tipográfica en 1805, Vieytes denunció
            públicamente que 'la escasez de letra con que se halla nuestra única
            imprenta hace imposible la edición de las noticias publicadas en
            pliego separado': una declaración que confirma que el cuello de
            botella material de la imprenta era, en sí mismo, una cuestión
            política. Es un antecedente directo de la prensa revolucionaria.
          cita_textual: >-
            el Semanario de Agricultura, Industria y Comercio, de Juan Hipólito
            Vieytes, con igual formato y un total de 218 números
          estado: "Conservada (Biblioteca Nacional Argentina)"

      - imagen:
          tipo: "Impreso patriótico breve"
          titulo: "El Triunfo Argentino. Poema Heroico"
          autor: "Real Imprenta de Niños Expósitos"
          datos: "1808 · Buenos Aires, Argentina"
          images: [L009.png]
        texto:
          descripcion: >-
            Poema heroico compuesto e impreso en la Real Imprenta de Niños
            Expósitos en 1808 para celebrar el triunfo de la reconquista de
            Buenos Aires sobre las tropas inglesas. Formato in 8º, tres folios,
            tinta negra sobre papel. La pieza condensa el papel de la imprenta
            porteña como aparato propagandístico autorizado: tras la
            reconquista, el taller publicó folletos, bandos y proclamas que
            celebraban a los héroes de la defensa —Liniers, Pueyrredón, el
            Regimiento de Patricios— y consolidaban una mitología de la victoria
            que pocos años más tarde serviría también para legitimar la ruptura
            con España. Es un ejemplo del primer género propagandístico militar-patriótico rioplatense, que ya en 1808 había aprendido a usar la imprenta como instrumento de construcción simbólica del Estado.
          cita_textual: >-
            El Triunfo Argentino. Poema Heroico. Poema, textual impreso... Real
            Imprenta de Niños Expósitos, 1808
          estado: "Conservada (DGPeIH, Buenos Aires)"

      - imagen:
          tipo: "Periódico bilingüe / propaganda imperial"
          titulo: "The Southern Star / La Estrella del Sur"
          autor: "Thomas Bradford (editor); imprenta inglesa"
          datos: "23 de mayo - 1 de septiembre de 1807 · Montevideo, Uruguay (en territorio bajo ocupación británica)"
          images: [L010.jpg]
        texto:
          descripcion: >-
            Primer periódico bilingüe inglés-español del Río de la Plata,
            impreso en Montevideo durante la ocupación británica de 1807. Su
            contenido combinaba avisos comerciales, noticias militares y
            artículos propagandísticos que prometían a los lectores locales las
            ventajas de la 'protección inglesa' frente a la 'opresión monárquica
            española'. Bradford instaló una imprenta moderna en hierro, una
            rareza absoluta para el Río de la Plata. Tras la capitulación
            inglesa, vendió todo el equipo a la Casa de Expósitos de Buenos
            Aires, que lo trasladó en la balandra Copiango el 29 de septiembre
            de 1807. La pieza tiene una doble vida archivística: como periódico
            —de circulación brevísima, alarmante para la Audiencia de Buenos
            Aires— y como prensa y tipos, que se convirtieron en el aparato
            productivo de la imprenta porteña durante la Revolución de Mayo.
          cita_textual: >-
            el periódico bilingüe The Southern Star o La Estrella del Sur
          estado: "Conservada (Biblioteca Nacional del Uruguay y Argentina; facsímil 2007)"


  # ── Sala II ─────────────────────────────────────────────────
  - romano: "II"
    portadilla:
      nombre: "La gráfica de la Revolución"
      periodo: "1810-1859"
      cita_curatorial: >-
        Con la Revolución de Mayo la imprenta se vuelve instrumento político: 
        La Gazeta de Buenos Ayres (1810), impulsada por Mariano Moreno, inaugura 
        la prensa revolucionaria. Junto a los primeros almanaques cívicos, estas 
        piezas acompañan la construcción de un Estado naciente.
    piezas:
      - imagen:
          tipo: "Libro político traducido"
          titulo: "El Contrato Social (edición de Mariano Moreno)"
          autor: "Jean-Jacques Rousseau (autor); traducción y prólogo de Mariano Moreno"
          datos: "1810 · Buenos Aires, Argentina"
          images: [L011.jpg]
        texto:
          descripcion: >-
            Edición castellana del Contrato Social impresa en la Real Imprenta
            de Niños Expósitos por orden de Mariano Moreno, secretario de la
            Primera Junta. La operación es doble: por un lado, Moreno traduce y
            publica el texto rousseauniano para justificar la legitimidad del
            gobierno revolucionario; por otro, suprime los capítulos sobre
            religión, considerándolos ofensivos para una población católica
            recién liberada del orden colonial. El libro circuló profusamente en
            escuelas y juntas locales del interior, y se convirtió en uno de los
            pilares del imaginario constitucional rioplatense. Pocos ejemplares
            de la primera edición sobreviven en perfectas condiciones; la
            mayoría fueron leídos hasta el desgaste. Es un ejemplo de la primera edición política latinoamericana que asumió explícitamente que traducir era reescribir.
          cita_textual: >-
            importantes obras como El Contrato Social de Jean-Jacques Rousseau,
            traducido por Mariano Moreno
          estado: "Ejemplares dispersos en bibliotecas y archivos"

      - imagen:
          tipo: "Periódico revolucionario"
          titulo: "La Gazeta de Buenos Ayres"
          autor: "Mariano Moreno (impulsor); Manuel Belgrano y Juan José Castelli (redactores iniciales)"
          datos: "1810 (primer número: 7 de junio) · Buenos Aires, Argentina"
          images: [L012.jpg]
        texto:
          descripcion: >-
            Órgano oficial de la Primera Junta de Gobierno, fundado por
            iniciativa de Mariano Moreno y publicado por primera vez el 7 de
            junio de 1810. Impreso en la Real Imprenta de Niños Expósitos, su
            número uno se convirtió en el documento gráfico más reproducido del
            repertorio revolucionario argentino: la Gazeta es la primera
            evidencia material de que la independencia rioplatense se hizo
            también con tinta de Buenos Aires. La fecha del primer número se
            conmemora hoy como Día del Periodismo en Argentina. Lo paradójico es que el órgano fundacional del periodismo nacional se imprimió en la misma prensa que durante treinta años había impreso bandos virreinales; hasta 1815 no se permitió que ninguna otra imprenta operara en Buenos Aires.
          cita_textual: >-
            La Gazeta de Buenos Ayres, órgano de difusión paradigmático del
            periodismo argentino
          estado: "Conservada (Biblioteca Nacional, Museo Saavedra)"

      - imagen:
          tipo: "Almanaque cívico"
          titulo: "Almanak patriótico de Buenos Ayres, para el año décimo de nuestra libertad"
          autor: "Imprenta de la Independencia"
          datos: "1819 · Buenos Aires, Argentina"
          images: [L013.jpg]
        texto:
          descripcion: >-
            Primer almanaque rioplatense en abandonar el régimen estrictamente
            religioso del calendario virreinal. Publicado en 1819 por la
            Imprenta de la Independencia para conmemorar el décimo año de la
            Revolución de Mayo, mantiene la estructura del almanaque colonial
            —festividades, santos, calendario lunar— pero incorpora un
            repertorio nuevo: nómina de edificios públicos y religiosos de
            Buenos Aires, fechas célebres patrias, número de habitantes de la
            ciudad y alrededores. La operación es notable: el género que durante
            tres décadas había servido para sincronizar a la sociedad colonial
            con el calendario eclesiástico se transforma en herramienta de
            inventario de la república recién nacida. Es la primera evidencia material de que la Revolución de Mayo no sólo cambió el gobierno, sino el tipo de información que un libro doméstico necesitaba ofrecer.
          cita_textual: >-
            Almanak patriótico de Buenos Ayres, para el año décimo de nuestra
            libertad. Buenos Aires, Imprenta de la Independencia, 1819
          estado: "Ejemplar conservado (gentileza Dr. Alejandro Parada)"

      - imagen:
          tipo: "Almanaque comercial / guía urbana"
          titulo: "Almanaques de comercio Blondel"
          autor: "Blondel (editor)"
          datos: "1826-1836 · Buenos Aires, Argentina"
          images:
            - {file: L014.jpg,   slot: [1, 3, 3, 5]}
            - {file: L014-1.jpg, slot: [4, 3, 3, 5]}
        texto:
          descripcion: >-
            Serie de almanaques comerciales publicados en Buenos Aires durante
            la década en que se consolidó el comercio porteño
            post-independencia. Combinaban la estructura tradicional del
            almanaque (calendario, festividades, fases lunares) con secciones
            publicitarias y guías de comercios, profesionales, librerías y
            servicios. Para los historiadores del libro como Alejandro Parada,
            los almanaques Blondel constituyen 'la fuente de información más
            importante para identificar las librerías de la época': una
            operación archivística involuntaria, donde una publicación pensada
            para uso cotidiano se vuelve siglo y medio más tarde el único
            registro disponible de un sector entero de la cultura impresa
            portenia. Son un ejemplo perfecto del valor patrimonial paradójico de los impresos utilitarios. Lo que se imprimió para ser tirado a fin de año es lo que termina conservando la memoria de todo lo demás.
          cita_textual: >-
            los almanaques de comercio Blondel (1826-1836)... constituyen la
            fuente de información más importante para identificar las librerías
            de la época
          estado: "Conservada parcialmente (bibliotecas, colecciones privadas)"


  # ── Sala III ─────────────────────────────────────────────────
  - romano: "III"
    portadilla:
      nombre: "Sátira, prensa y Centenario"
      periodo: "1860-1909"
      cita_curatorial: >-
        La prensa satírica ilustrada —El Mosquito, Don Quijote— y, con el cambio 
        de siglo, Caras y Caretas (1898) inauguran una cultura visual de masas 
        que combina fotografía, caricatura y publicidad. En el clima del 
        Centenario, la ilustración se vuelve el principal lenguaje gráfico del país.
    piezas:
      - imagen:
          tipo: "Revista satírica de caricaturas"
          titulo: "El Mosquito"
          autor: "Henri Stein, Monriot, Advinent (dibujantes franceses)"
          datos: "1863-1893 · Buenos Aires, Argentina"
          images: [L015.png]
        texto:
          descripcion: >-
            Revista de caricaturas políticas más longeva de la Argentina del
            siglo XIX, fundada por el dibujante francés Henri Stein en 1863 y
            publicada durante treinta años hasta 1893. El Mosquito instaló en
            Buenos Aires el modelo francés de la caricatura política semanal —Le
            Charivari, La Caricature— operando con dibujantes europeos formados
            en París y litografía como técnica principal. La revista atravesó
            toda la segunda mitad del siglo XIX argentino, desde los gobiernos
            liberales hasta la presidencia de Juárez Celman y la Revolución del
            Parque. Su cierre en 1893 dejó el espacio satírico libre para que
            Don Quijote (Sojo) y luego Caras y Caretas (Pellicer) lo ocuparan.
            Es la matriz fundacional de la caricatura política argentina, el primer caso en que se importó masivamente el oficio europeo y se lo aplicó a la lucha política local.
          cita_textual: >-
            Stein, Henri, Monriot, Advinent– creaban El Mosquito
          estado: "Conservada (Biblioteca Nacional, hemerotecas)"

      - imagen:
          tipo: "Semanario satírico-político"
          titulo: "Don Quijote (semanario)"
          autor: "Eduardo Sojo ('Demócrito'), con José María Cao ('Demócrito II') y Manuel Mayol ('Heráclito')"
          datos: "1884-1903 · Buenos Aires, Argentina"
          images: [L016.jpg]
        texto:
          descripcion: >-
            Semanario satírico de caricaturas fundado por el español Eduardo
            Sojo en 1884 y publicado durante diecinueve años hasta 1903. Don
            Quijote llevó la caricatura política argentina a niveles inéditos de
            virulencia contra el régimen roquista; en su mejor momento, los
            gobiernos lo persiguieron, lo censuraron y lo demandaron sin lograr
            cerrarlo. El semanario formó la primera generación de caricaturistas
            profesionales del Río de la Plata: José María Cao ('Demócrito II') y
            Manuel Mayol ('Heráclito') aprendieron el oficio en sus páginas
            antes de pasar masivamente a Caras y Caretas en 1898. Don Quijote y
            Caras y Caretas funcionaron durante cinco años como las dos
            revistas-modelo del periodismo gráfico argentino, una más virulenta
            y otra más popular; el cierre de Don Quijote en 1903 dejó a Caras y
            Caretas como única heredera. Es una pieza fundacional del periodismo satírico argentino.
          cita_textual: >-
            el mecanismo de reemplazo entre Don Quijote (1884-1903) y Caras y
            Caretas
          estado: "Conservada (Biblioteca Nacional, hemerotecas)"

      - imagen:
          tipo: "Álbum institucional fotográfico"
          titulo: "Galería de los ladrones de la Capital"
          autor: "Imprenta policial / atribuido a José Sixto Álvarez ('Fray Mocho')"
          datos: "1887 · Buenos Aires, Argentina"
          images: [L017.png]
        texto:
          descripcion: >-
            Publicación ilustrada producida por la imprenta policial de Buenos
            Aires en 1887, atribuida a José Sixto Álvarez ('Fray Mocho'),
            entonces subcomisario y luego fundador editorial de Caras y Caretas.
            La obra tenía un objetivo institucional concreto: fijar, mediante la
            fotografía y la descripción individualizada, los rostros y rasgos de
            los delincuentes registrados de la ciudad, para uso del personal
            policial y eventualmente del público. La 'Galería' es el primer
            compendio iconográfico argentino producido específicamente para
            vigilancia masiva: combina foto, texto y dispositivo de archivo en
            una operación editorial que anticipa los métodos del fichaje
            policial moderno. El mismo hombre que organizó visualmente la vigilancia popular fue, una década después, el director de la revista que dio voz humorística a esa misma cultura popular vigilada.
          cita_textual: >-
            Galería de los ladrones de la Capital (1887), publicada por la
            imprenta policial con un objetivo institucional concreto
          estado: "Conservada (Archivo Policial, ediciones facsimilares)"

      - imagen:
          tipo: "Revista semanal ilustrada (versión inicial)"
          titulo: "Caras y Caretas (Montevideo)"
          autor: "Eustaquio Pellicer (director) con Charles Schultz (dibujante alsaciano)"
          datos: "1890-1897 · Montevideo, Uruguay"
          images: [L018.jpg]
        texto:
          descripcion: >-
            Versión montevideana original de Caras y Caretas, fundada por
            Pellicer en 1890 ocho años antes que su par porteña. Operada con el
            dibujante alsaciano Charles Schultz, ensayó por primera vez la
            fórmula que después arrasaría en Buenos Aires: actualidad ilustrada,
            humor, sátira política suave, folletín, publicidad. Una de sus
            operaciones más interesantes fue la primera novela colectiva impresa
            del Río de la Plata, 'Por seguir a un galgo' (1890), escrita por
            siete autores rotativos —Daniel Muñoz, Alfredo Duhau, Ricardo Usher
            Blanco, Enrique Lemos, José Artal, Víctor Arreguine y el propio
            Pellicer— donde cada uno escribía un capítulo a partir del final del
            anterior, con el mandato explícito de complicarle la continuidad al
            siguiente. Es el laboratorio uruguayo de la fórmula editorial argentina más exitosa.
          cita_textual: >-
            a cargo de Pellicer y por el dibujante alsaciano Charles Schultz
          estado: "Conservada parcialmente (Biblioteca Nacional del Uruguay)"

      - imagen:
          tipo: "Revista semanal ilustrada / industria gráfica"
          titulo: "Caras y Caretas (Buenos Aires)"
          autor: "Fundada por Eustaquio Pellicer; con José Sixto Álvarez 'Fray Mocho' (director); Bartolomé Mitre y Vedia (administrador); Manuel Mayol (dibujante principal)"
          datos: "1898-1939 · Buenos Aires, Argentina"
          images: [L019.jpg]
        texto:
          descripcion: >-
            'Revista festiva, literaria, artística y de actualidades' fundada en
            Buenos Aires en 1898. Durante cuatro décadas fue la publicación
            gráfica más leída del Río de la Plata: combinó actualidad
            fotográfica, humor satírico, folletín, publicidad, ilustración y
            caricatura en una fórmula que reinventó el periodismo masivo
            argentino. Sus dibujantes —José María Cao, Manuel Mayol, Aurelio
            Giménez, Mario Zabataro, Charles Schultz— formaron la primera
            generación de profesionales de la imagen argentinos. La revista se
            imprimía en la Compañía Sud-Americana de Billetes de Banco, una de
            las imprentas industriales más equipadas de la ciudad, con equipos
            completos de grabado, tipografía, encuadernación, litografía y
            fundición. Es una pieza-sistema. No es un objeto individual sino la primera infraestructura gráfica modernizada del Río de la Plata, que durante cuatro décadas produjo semanalmente el imaginario visual del país.
          cita_textual: >-
            La revista Caras y caretas (1898-1939) fundada por Eustaquio
            Pellicer y José Sixto Álvarez 'Fray Mocho' marcó un hito
          estado: "Conservada (Biblioteca Nacional, hemerotecas)"

      - imagen:
          tipo: "Tapa de revista / caricatura política"
          titulo: "Tapa 'El nuevo Luis XIV' (Caras y Caretas N° 16)"
          autor: "José María Cao"
          datos: "29 de octubre de 1898 · Buenos Aires, Argentina"
          images: [L020.jpg]
        texto:
          descripcion: >-
            Tapa de Caras y Caretas N° 16, publicada el 29 de octubre de 1898
            con dibujo de José María Cao. Caricatura del general Roca
            representado como Luis XIV, sentado en un trono con peluca y ropajes
            del rey francés, cortando con una tijera el mapa de la Puna de
            Atacama. La estrofa satírica al pie firma el mensaje: 'La cuestión
            de la Puna de Atacama / por su cuenta arregló, / diciendo lo que
            dijo Luis XIV: / El Estado soy yo'. La pieza es el primer ataque
            frontal de Caras y Caretas a Roca, lanzado apenas dos semanas
            después del primer número de la revista. Inaugura una operación que
            la revista practicaría durante toda la presidencia: critica al
            presidente vía iconografía europea —Luis XIV, Felipe II, papas,
            Napoleones— para vincular sus prácticas con el absolutismo. Es un caso emblemático del momento en que Caras y Caretas, recién nacida, se posiciona políticamente.
          cita_textual: >-
            Cao, 'El nuevo Luis XIV', en Caras y Caretas, 29 de octubre de 1898
          estado: "Conservada (colecciones encuadernadas de Caras y Caretas)"

      - imagen:
          tipo: "Caricatura política / nota gráfica"
          titulo: "Caricatura 'Los ministros odontólogos' (Caras y Caretas, septiembre de 1902)"
          autor: "Caricaturista no identificado del staff de Caras y Caretas"
          datos: "13 de septiembre de 1902 · Buenos Aires, Argentina"
          images: [L021.png]
        texto:
          descripcion: >-
            Ilustración satírica publicada en Caras y Caretas el 13 de
            septiembre de 1902, a propósito del escándalo del traslado de los
            restos de Manuel Belgrano a una nueva sepultura. La crónica
            denunciaba que los ministros de Guerra e Interior, Pablo Riccheri y
            Joaquín V. González, se habían llevado piezas dentarias del prócer
            como recuerdo durante la ceremonia oficial. La página siguiente
            desarrollaba el hecho en clave gráfica: una ilustración mostraba a
            Belgrano levantándose de la tumba y reclamando a los dos ministros
            'Hasta los dientes me llevan! ¿No tendrán bastante con los propios
            para comer del presupuesto?'. Es un ejemplo representativo de la operación humorística de Caras y Caretas, que convierte un episodio puntual en escándalo nacional vía dibujo satírico y generaliza la falta moral a todo el régimen.
          cita_textual: >-
            el hecho era retomado de modo satírico con una ilustración titulada
            'Los ministros odontólogos'
          estado: "Conservada (Caras y Caretas, 13 de septiembre de 1902)"

      - imagen:
          tipo: "Folletín ilustrado / diseño editorial seriado"
          titulo: "Folletines de Caras y Caretas (serie 1904 en adelante)"
          autor: "Varios (Conan Doyle, Roberto Payró, Eduardo Holmberg, Mark Twain, Javier de Viana, Paul Groussac, Eduardo de la Barra, Rafael Barreda, Arthur Morrison)"
          datos: "1904-1910 · Buenos Aires, Argentina"
          images: [L022.jpg]
        texto:
          descripcion: >-
            Inauguración del folletín en Caras y Caretas en agosto de 1904, en
            respuesta a la pérdida de exclusividad de la revista en la oferta
            fotográfica (los diarios habían empezado a incorporar fotos). La
            nueva sección consolidó un sistema editorial híbrido: novelas por
            entregas con ilustraciones específicas, traducidas, recicladas o de
            producción propia. Los títulos iniciales incluyeron 'La pesquisa',
            'La última pesquisa' de Arthur Conan Doyle, 'El robo de los dos
            millones' de Rafael Barreda, 'El falso inca' de Roberto Payró, 'El
            teniente coronel Fray Luis Beltrán' de Eduardo de la Barra, 'El
            diario de Eva' de Mark Twain, 'La tapera del cuervo' de Javier de
            Viana. Es un ejemplo de la flexibilidad estructural de la revista masiva argentina, que ante la presión competitiva muta de inmediato el formato sin perder identidad.
          cita_textual: >-
            comenzó una nueva etapa con la publicación de su primer folletín, un
            género que había demostrado desde mucho antes su éxito en los
            periódicos
          estado: "Conservada en hemerotecas"


  # ── Sala IV ─────────────────────────────────────────────────
  - romano: "IV"
    portadilla:
      nombre: "Marcas, almanaques y modernismo"
      periodo: "1910-1945"
      cita_curatorial: >-
        La irrupción de la identidad de marca, la publicidad moderna y el
        indigenismo cultural argentino. YPF, Siam Di Tella, Geniol, Plus Ultra,
        Viracocha: el diseño se profesionaliza sin todavía nombrarse a sí mismo.
    piezas:
      - imagen:
          tipo: "Almanaque náutico-enciclopédico ilustrado"
          titulo: "Almanaque del Mensajero"
          autor: "M. Sundt (fundador, 1901-1911); Viuda de Sundt (1912-1931); Editorial Peuser (a partir de los años 30)"
          datos: "1901-1931 (serie Sundt) · Buenos Aires, Argentina"
          images:
            - {file: L023-3.png, slot: [1, 1, 2, 3], valign: top}
            - {file: L023-4.png, slot: [1, 4, 2, 3]}
            - {file: L023-5.png, slot: [1, 7, 2, 3], valign: bottom}
            - {file: L023-2.png, slot: [3, 1, 4, 4.5], halign: right}
            - {file: L023.jpg,   slot: [3, 5.5, 4, 4.5], halign: right}
        texto:
          descripcion: >-
            Almanaque fundado en 1901 por el austríaco M. Sundt como pequeño
            folleto de 80 páginas; llegó a las 356 páginas y se mantuvo en
            publicación hasta al menos 1931 bajo la editora 'Viuda de Sundt'.
            Combinaba calendario y almanaque, reseña de todos los Estados
            independientes del mundo, historia del año, guía oficial con datos
            estadísticos de población y educación, miscelánea, atlas, tarifas y
            fórmulas para distintos usos —desde calcular sueldos hasta convertir
            pesos y medidas. Premiado con diploma y medalla de oro en la
            Exposición de Artes Gráficas del Centenario (1916). Lüsebrink lo
            describiría como 'máquina textual': un dispositivo de orientación en
            el tiempo, el espacio, la historia y los saberes útiles. Es un caso representativo del almanaque rioplatense del primer tercio del siglo XX, un género popular, ilustrado, masivo y casi siempre descartado por sus propios lectores al terminar el año.
          cita_textual: >-
            El Almanaque del Mensajero salió por primera vez en 1901, y 1931 fue
            posiblemente el último año de publicación de esta serie por parte de
            la editora Sundt
          estado: "Conservada (12 ejemplares estudiados por Mosqueda; serie incompleta en bibliotecas)"

      - imagen:
          tipo: "Página interior con espacios manuscritos"
          titulo: "Página 'Tabla cronológica' del Almanaque del Mensajero"
          autor: "M. Sundt (editor)"
          datos: "1909 y siguientes · Buenos Aires, Argentina"
          images: [L024.webp]
        texto:
          descripcion: >-
            Página interior del Almanaque del Mensajero diseñada para ser
            completada manualmente por el lector. Contenía corazones y escudos
            en blanco donde el comprador debía escribir los nombres de su
            genealogía familiar empezando por los bisabuelos; en la página
            siguiente, titulada 'Crónica de familia', se anotaban los
            acontecimientos familiares del año. La operación editorial es
            elocuente: el almanaque comprado en la librería se completaba en
            casa con la propia historia. Eso convirtió a cada ejemplar en pieza
            única una vez usada. Mosqueda documenta un caso conservado: el
            almanaque de 1917 lleva las anotaciones manuscritas de un tal Arturo
            Luna, argentino, con los nombres de sus bisabuelos, abuelos y la
            fecha de su boda (4 de octubre de 1916). La pieza es paradigmática
            del archivo: un objeto editorial pensado para volverse propiedad
            escrita del usuario, donde la línea entre editor y lector se vuelve
            porosa.
          cita_textual: >-
            el Almanaque incluía una tabla cronológica con corazones y escudos
            en blanco que el lector debía completar con los datos de su familia
          estado: "Conservada (ejemplar de Arturo Luna, 1917, entre otros)"

      - imagen:
          tipo: "Almanaque literario y enciclopédico"
          titulo: "El Pasatiempo. Almanaque literario, ilustrado, noticioso"
          autor: "Editorial Peuser (Buenos Aires)"
          datos: "1904 y siguientes · Buenos Aires, Argentina"
          images: [L025-1.jpg]
        texto:
          descripcion: >-
            Almanaque editado por la Editorial Peuser a partir de 1904,
            deliberadamente concebido como adaptación al mercado porteño de un
            homónimo español, El pasatiempo. Almanaque humorístico, literario y
            científico publicado desde 1869. La operación editorial es
            elocuente: la versión argentina suprime el tono humorístico del
            original español, elimina la firma del 'almanaquero' que en España
            firmaba el conjunto y se presenta como un producto editorial puro.
            Incluye cuentos, rimas, biografías, crónicas de viajes por la
            Argentina, fragmentos de novelas, prólogos y agenda mensual a doble
            página para que el lector escribiera. Las páginas internas
            funcionaban además como catálogo de la propia editorial Peuser: en
            la retiración de tapa y contratapa se promocionaban los libros
            disponibles como 'regalos esencialmente a propósito para Navidad y
            Año Nuevo'. Es una muestra de la transición del almanaque-fórmula editorial al almanaque-catálogo comercial.
          cita_textual: >-
            El Pasatiempo (1904) ofrecía —luego de las secciones fijas— una
            miscelánea de cuentos, rimas, biografías, crónicas de viajes
          estado: "Conservada (ejemplares en bibliotecas)"

      - imagen:
          tipo: "Identidad institucional / sistema gráfico de empresa pública"
          titulo: "Identidad gráfica YPF (símbolo y aplicaciones tempranas)"
          autor: "YPF (Yacimientos Petrolíferos Fiscales) con desarrollo gráfico colaborativo"
          datos: "1922-1955 · Buenos Aires, Argentina"
          images: [L026.png]
        texto:
          descripcion: >-
            Sistema de identidad gráfica de YPF, primera empresa petrolera
            estatal del mundo, fundada en 1922. El símbolo gráfico fue aplicado
            en escalas múltiples —papelería institucional, surtidores, fachadas
            de estaciones, vehículos de reparto, publicidad en revistas— en lo
            que constituye una de las primeras operaciones argentinas de
            identidad corporativa sostenida. La pieza es archivísticamente
            compleja: las estaciones de servicio fueron construidas en estilos
            arquitectónicos diversos (racionalista, art deco, pintoresquista)
            según las regiones y décadas, pero todas exhibían el mismo símbolo
            gráfico. Es el primer caso latinoamericano de sistema gráfico aplicado a una empresa pública de escala nacional, y una pieza que sigue mutando. Cada actualización del logo borra la anterior, y la identidad histórica sobrevive sólo en fotografías y archivos publicitarios.
          cita_textual: >-
            El símbolo gráfico de YPF se aplicó a diversas escalas en
            publicidades y en los múltiples espacios de venta
          estado: "En uso (logo actualizado); piezas históricas conservadas en archivo YPF y privados"

      - imagen:
          tipo: "Afiches publicitarios / cartelería"
          titulo: "Campaña publicitaria 'Geniol' de Lucien Achille Mauzan"
          autor: "Lucien Achille Mauzan"
          datos: "c. 1925-1940 · Buenos Aires, Argentina (Mauzan nacido en Francia)"
          images: [L027.jpg]
        texto:
          descripcion: >-
            Campaña publicitaria para el medicamento Geniol diseñada por el
            ilustrador francés Lucien Achille Mauzan, radicado en Buenos Aires
            durante los años 20 y 30. La iconografía —el rostro deformado por el
            dolor de cabeza, con la mano en la sien, en gran formato y colores
            saturados— se convirtió en una de las imágenes publicitarias más
            reconocibles de la Argentina del siglo XX. Mauzan había trabajado
            antes en Italia y Francia y aplicó al mercado porteño las técnicas
            del cartel europeo de gran formato (Cappiello, Cassandre). La pieza
            es un caso representativo del traslado tecnológico de la publicidad
            europea al Río de la Plata por vía de la inmigración profesional. Es un ejemplo del momento en que la publicidad argentina dejó de ser texto y empezó a ser imagen.
          cita_textual: >-
            figuras como Lucien Achille Mauzan (publicidad Geniol)
          estado: "Conservada (afiches dispersos en colecciones privadas y museos)"

      - imagen:
          tipo: "Identidades corporativas / sistemas de marca"
          titulo: "Identidades de marcas iconográficas argentinas (1930-1950)"
          autor: "Estudios y agencias varias (locales e internacionales)"
          datos: "1930-1950 · Buenos Aires, Argentina"
          images:
            - {file: L028.jpg,   slot: [1, 1, 3, 4]}
            - {file: L028-2.png, slot: [4, 1, 3, 4]}
            - {file: L028-4.png, slot: [1, 5, 3, 5], valign: bottom}
            - {file: L028-3.jpg, slot: [4, 5, 3, 5], halign: right, valign: bottom}
        texto:
          descripcion: >-
            Conjunto de identidades visuales de las marcas que constituyeron el
            repertorio iconográfico cotidiano de la Argentina de la ISI:
            Philips, Siemens, cigarrillos Sublimes y París, Cinzano, Bols,
            Fernet Branca, Chocolate Águila, Canale, Bagley, Terrabusi. Algunas
            eran marcas internacionales adaptadas (Philips, Siemens, Cinzano),
            otras locales (Águila, Canale, Bagley, Terrabusi). El sistema
            publicitario de la época —afiches en estaciones de tren y vagones,
            avisos en revistas, concursos de carteles, jingles radiales— las
            hizo presentes en todos los hogares argentinos durante dos décadas.
            Se reúnen como conjunto porque la operación gráfica de identidad de marca a gran escala se consolidó en la Argentina de los años 30-40 antes de que existieran las primeras escuelas de diseño, cuando el saber se transmitía por talleres y agencias, no por academias.
          cita_textual: >-
            la identidad de grandes empresas como Philips, Siemens, cigarrillos
            Sublimes y París, Cinzano, Bols, Fernet Branca, Chocolate Águila,
            Canale, Bagley, Terrabusi
          estado: "Conservada parcialmente; muchas identidades originales reemplazadas por rediseños posteriores"

      - imagen:
          tipo: "Ilustración editorial integral"
          titulo: "Ilustraciones y diseño editorial de Alejandro Sirio"
          autor: "Alejandro Sirio"
          datos: "1910-1953 · Buenos Aires, Argentina (nacido en España)"
          images: [L029.jpg]
        texto:
          descripcion: >-
            Obra ilustrativa del español Alejandro Sirio (1890-1953), llegado a
            Buenos Aires en 1910 y considerado por la historiografía del diseño
            argentino como uno de los pocos ilustradores de la primera mitad del
            siglo XX que practicó una operación verdaderamente integral: combinó
            dibujo, tipografía y puesta en página en una unidad de diseño, en
            una época en que esas tareas las hacían profesionales distintos.
            Trabajó para Caras y Caretas, Plus Ultra, Mundo Argentino, La Nación
            y para editoriales como Atlántida y Peuser. Sus ilustraciones para
            los cuentos de Horacio Quiroga y para crónicas de viajes son hoy
            referencias canónicas. Es un ejemplo paradigmático del ilustrador que opera como diseñador gráfico antes de que la disciplina exista institucionalmente en Argentina.
          cita_textual: >-
            se destaca la obra artística del eximio ilustrador Alejandro Sirio
          estado: "Conservada (originales y reproducciones en revistas y libros)"

      - imagen:
          tipo: "Revista mensual ilustrada"
          titulo: "Plus Ultra (suplemento mensual de Caras y Caretas)"
          autor: "Staff de Caras y Caretas (Pellicer, Cao, Mayol, Giménez)"
          datos: "1916-1930 · Buenos Aires, Argentina"
          images: [L030.png]
        texto:
          descripcion: >-
            Suplemento mensual de Caras y Caretas publicado entre 1916 y 1930. A
            diferencia del semanario, que privilegiaba la actualidad y el humor
            satírico, Plus Ultra apuntó al diseño editorial cuidado, la
            identidad gráfica propia y la reproducción de obras del Museo
            Nacional de Bellas Artes y de colecciones privadas argentinas. La
            revista funcionó como puente entre la cultura impresa masiva y el
            circuito artístico legitimado: usó la misma infraestructura
            industrial de Caras y Caretas (Compañía Sud-Americana de Billetes de
            Banco) pero compuso un objeto de circulación más lenta, más pesado,
            más caro y destinado a un público con mayor capital cultural. Es un ejemplo de la primera operación argentina de diferenciación editorial dentro de una misma empresa, la industria gráfica empezando a segmentar audiencias.
          cita_textual: >-
            Plus Ultra (1916-1930) fue un suplemento mensual de la revista donde
            colaboraba todo el staff del semanario
          estado: "Conservada"

      - imagen:
          tipo: "Manual escolar ilustrado"
          titulo: "Viracocha (manual escolar)"
          autor: "Editado por Curt Berger y Cía.; diseño del escultor Gonzalo Leguizamón Pondal y el arquitecto Alberto Gelly Cantilo"
          datos: "1923 · Buenos Aires, Argentina"
          images:
            - {file: L031-1.jpg, slot: [1, 1.5, 6, 4]}
            - {file: L031-2.jpg, slot: [1, 5.5, 6, 4]}
        texto:
          descripcion: >-
            Manual escolar publicado por Curt Berger y Cía. en 1923, con diseño
            del escultor Gonzalo Leguizamón Pondal y el arquitecto Alberto Gelly
            Cantilo. Sistematizó el dibujo decorativo americano para ser
            enseñado en las escuelas primarias argentinas. Recibió la Medalla de
            Oro del VI Salón Nacional de Arte Decorativo y, por decisión del
            Consejo Nacional de Educación, fue adoptado para la enseñanza de la
            plástica. La operación es notable: un manual de circulación masiva
            escolar puso en manos de cada chico argentino, durante varios años,
            un repertorio iconográfico precolombino transformado en propuesta
            pedagógica nacional. La pieza materializa en formato escolar el
            programa que Rojas había anunciado en Eurindia un año antes. Es una prueba de que el indigenismo cultural argentino no fue sólo un debate de élite. Efectivamente bajó a las aulas, en cuadernos ornamentados con grecas calchaquíes y motivos diaguitas.
          cita_textual: >-
            el manual escolar Viracocha, editado por Curt Berger y Cía en 1923,
            el hito educativo que permite sistematizar el dibujo decorativo
            americano
          estado: "Conservada parcialmente (escasos ejemplares completos en bibliotecas)"

      - imagen:
          tipo: "Libro ilustrado / repertorio decorativo"
          titulo: "Silabario de la decoración americana"
          autor: "Ricardo Rojas"
          datos: "1930 · Buenos Aires, Argentina"
          images:
            - {file: L032-1.jpg, slot: [1, 1, 6, 5]}
            - {file: L032-2.jpg, slot: [1, 6, 6, 4]}
        texto:
          descripcion: >-
            Libro publicado por Ricardo Rojas en 1930 como sistematización
            gráfica de los motivos decorativos americanos derivados del arte
            precolombino. La obra cataloga, clasifica y reproduce greca por
            greca el repertorio iconográfico de las culturas originarias del
            continente, con el objetivo declarado de poner a disposición de
            diseñadores, artistas, arquitectos y maestros un alfabeto visual
            americano alternativo al repertorio decorativo europeo. La
            publicación dialoga con el Silabario de Manuel Antonio Carreño y con
            los catálogos ornamentales de Owen Jones y Ernst Haeckel, pero opera
            con materiales que esos catálogos europeos habían omitido. Es un ejemplo paradigmático de operación archivística desde adentro. Rojas no espera que un museo conserve el repertorio americano, sino que lo cataloga él mismo en formato editorial.
          cita_textual: >-
            Silabario de la decoración americana (1930)
          estado: "Conservada"


  # ── Sala V ─────────────────────────────────────────────────
  - romano: "V"
    portadilla:
      nombre: "Peronismo gráfico"
      periodo: "1946-1955"
      cita_curatorial: >-
        Entre 1946 y 1955, el Estado peronista alcanza una densidad gráfica 
        sin precedentes: la SIPP centraliza los afiches y las empresas estatales 
        estrenan identidades visuales. Tras 1955, el Decreto 4161/56 manda 
        destruir ese material: muchas piezas sobreviven solo porque alguien 
        las escondió.
    piezas:
      - imagen:
          tipo: "Identidades institucionales / sistema simbólico estatal"
          titulo: "Identidades gráficas de las empresas estatales peronistas"
          autor: "Estado argentino (varios diseñadores anónimos)"
          datos: "1941-1952 · Buenos Aires, Argentina"
          images:
            - {file: L033.png,   slot: [1, 1, 3, 3]}
            - {file: L033-1.png, slot: [4, 1, 3, 3]}
            - {file: L033-2.jpg, slot: [1, 7, 6, 3]}
            - {file: L033-3.jpg, slot: [1, 4, 6, 3]}
        texto:
          descripcion: >-
            Conjunto de emblemas y aplicaciones gráficas de las empresas
            estatales creadas o estatizadas durante el primer peronismo:
            Fabricaciones Militares (1941), Acindar (1942), Techint (1945), Gas
            del Estado (1945), Agua y Energía (1947), Ferrocarriles Argentinos
            (1948), Teléfonos del Estado (1948), Aerolíneas Argentinas (1949),
            IAME (1952), Dirección Nacional de Industrias del Estado (DINIE).
            Los emblemas exhiben reminiscencias de los escudos militares:
            ovalado, simétrico, jerárquico, con tipografía mayúscula sólida y
            elementos heráldicos simplificados. La operación gráfica era
            coherente: cada empresa tenía un emblema propio, pero todos
            compartían un código visual que las identificaba como pertenecientes
            al programa del Estado nacional. Funciona como sistema, la primera vez en la historia argentina que el Estado opera con coherencia gráfica explícita en su patrimonio empresario.
          cita_textual: >-
            se crean nuevas: Gas del Estado (1945), Agua y Energía (1947),
            Teléfonos del Estado (1948), y Aerolíneas Argentinas (1949)
          estado: "Conservada parcialmente / algunas marcas actualizadas, otras desaparecidas"

      - imagen:
          tipo: "Corpus propagandístico estatal"
          titulo: "Corpus de afiches de la SIPP (Subsecretaría de Información, Prensa y Propaganda)"
          autor: "Anónimos / SIPP del Estado Argentino"
          datos: "1946-1955 · Buenos Aires, Argentina"
          images: [L034.png]
        texto:
          descripcion: >-
            Conjunto de afiches producidos por la Subsecretaría de Información,
            Prensa y Propaganda durante los dos primeros gobiernos de Perón. La
            SIPP centralizó la producción propagandística no sólo de todos los
            ministerios del gobierno nacional sino también de entidades
            autárquicas y de la Fundación Eva Perón a través de cinco
            direcciones: Espectáculos Públicos (área cinematográfica), Difusión,
            Publicidad, Prensa y Radiodifusión. La operación gráfica del corpus
            combinó la estética del realismo socialista, el muralismo mexicano y
            la caricatura popular en una sintaxis novedosa que recuperaba
            prácticas y costumbres de los sectores populares previamente
            estigmatizadas. Tras la caída del peronismo, el Decreto 4161/56 del
            5 de marzo de 1956 prohibió la circulación de todo el material
            gráfico del régimen depuesto. Es un caso paradigmático de patrimonio gráfico legalmente prohibido. Las piezas que sobreviven hoy lo hacen porque alguien las escondió antes de ser destruidas.
          cita_textual: >-
            afiches generados desde la Subsecretaría de Información, Prensa y
            Propaganda (SIPP) durante el período comprendido por los años 1946 y
            1955
          estado: "Conservada (Archivo General de la Nación; pocas piezas con autoría identificable)"

      - imagen:
          tipo: "Afiche político / propaganda visual"
          titulo: "Afiche 'Campesino rompiendo las cadenas' (SIPP)"
          autor: "Anónimo / SIPP"
          datos: "c. 1946-1948 · Buenos Aires, Argentina"
          images: [L035.jpg]
        texto:
          descripcion: >-
            Afiche del primer peronismo donde un campesino aparece en una
            demostración de fuerza y destreza física rompiendo cadenas, con la
            mano derecha empuñando una tacuara que sostiene la bandera
            argentina. La composición rompe la perspectiva moderna: el pie del
            personaje avanza sobre el espectador, apoyándose sobre la leyenda
            del afiche; el cuerpo se proyecta hacia afuera del cuadro. En
            segundo plano, un jinete con atuendos tradicionales monta un caballo
            presto a saltar. La estética anticipa por una década el trabajo del
            pintor Ricardo Carpani y dialoga directamente con el muralismo
            mexicano de Siqueiros y el realismo socialista soviético. El gesto
            de romper las cadenas remite explícitamente a un verso central del
            Himno Nacional Argentino. Es el afiche emblema de la primera fase peronista, con la justicia social y la modernización industrial fundidas en una iconografía de fuerza popular.
            popular.
          cita_textual: >-
            un campesino en una demostración de fuerza y destreza física...
            rompe las cadenas que lo ataban
          estado: "Conservada (AGN); autor no identificado"

      - imagen:
          tipo: "Afiche político / propaganda visual"
          titulo: "Afiche 'Obrero-campesino cargando una locomotora' (SIPP, nacionalización ferroviaria)"
          autor: "Anónimo / SIPP"
          datos: "c. 1948 · Buenos Aires, Argentina"
          images: [L036.png]
        texto:
          descripcion: >-
            Afiche producido alrededor de 1948, año de la nacionalización de los
            ferrocarriles. La imagen presenta una hibridación estética y de
            vestimenta entre un obrero y un campesino —tez morena, fisonomía no
            europea— cargando sobre sus hombros el peso de una locomotora. La
            iconografía es deliberada: el sujeto que sostiene la nueva propiedad
            estatal del sistema ferroviario no es el inmigrante europeo blanco
            asociado al ferrocarril privado británico, sino el 'cabecita'
            criollo que el peronismo había incorporado a la escena política. Es un ejemplo del programa simbólico de la propaganda peronista. La nacionalización de un activo material —los ferrocarriles— se acompaña de una nacionalización del cuerpo del trabajador en la iconografía oficial, con una fisonomía que no replica las prescripciones estéticas europeizantes sino que las disputa.
          cita_textual: >-
            hibridación estética y de vestimentas entre un obrero y un
            campesino... cargando el peso de una locomotora
          estado: "Conservada (AGN); autor no identificado"

      - imagen:
          tipo: "Afiche político / propaganda visual"
          titulo: "Afiche 'Familia rural y perfil apoteótico de Perón'"
          autor: "Anónimo / SIPP"
          datos: "c. 1950-1955 · Buenos Aires, Argentina"
          images: [L037.png]
        texto:
          descripcion: >-
            Afiche de la segunda fase peronista donde una familia rural ocupa el
            primer plano (hombre sosteniendo una pala) y el perfil del líder
            aparece al fondo en tono apoteótico con tonos amarillos. La elección
            iconográfica es deliberada: el perfil presidencial —y no el rostro
            frontal— sugiere cercanía con el espectador y con la familia,
            integrándolo a la escena en lugar de imponerse desde arriba. El
            crítico Gabriel Hernán describe la operación como 'plebeyización'
            conceptual de la imagen presidencial: la figura del Jefe de Estado
            se acerca al nivel de la familia trabajadora y del trabajo físico.
            La pieza sintetiza el cambio de la propaganda peronista hacia 1950:
            menos retórica movimientista de masas, más composición intimista del
            régimen como tutela paternal sobre la familia popular.
          cita_textual: >-
            aparece el perfil de Perón en tono apoteótico y con tonos
            amarillos... lo que se supone es una familia rural
          estado: "Conservada (AGN)"

      - imagen:
          tipo: "Afiche político / propaganda visual"
          titulo: "Afiche 'Tocando el sol' (turismo social peronista)"
          autor: "Anónimo / SIPP"
          datos: "c. 1950-1955 · Buenos Aires, Argentina"
          images: [L038.png]
        texto:
          descripcion: >-
            Afiche caricaturizado donde una figura humana estira el brazo hasta
            casi tocar el sol, sonriendo de manera jocosa y guiñando un ojo en
            gesto de complicidad. La operación rompe con la solemnidad de los
            afiches anteriores y entra en el registro del humor popular. La
            iconografía es leve pero el mensaje es radical: el acceso de los
            sectores populares al derecho a las vacaciones y a los enclaves
            geográficos antes reservados a las élites. La caricatura mira hacia
            abajo y hacia atrás —no al espectador— en una operación de
            complicidad horizontal entre pares. Al fondo, un edificio en el
            estilo arquitectónico clásico del peronismo (hoteles sindicales,
            sanatorios sociales) da solidez material al mensaje. Es un ejemplo del momento en que la propaganda peronista deja la épica y entra al humor. El régimen ya estabilizado puede burlarse de los códigos pasados de las élites.
          cita_textual: >-
            presenta una imagen caricaturizada, al parecer ingenua y risueña...
            la caricatura de una figura humana estira su brazo hasta casi tocar
            el sol
          estado: "Conservada (AGN)"

      - imagen:
          tipo: "Identidad de producto / diseño industrial peronista"
          titulo: "Identidad de marca IAME (motocicleta Puma)"
          autor: "IAME (Industrias Aeronáuticas y Mecánicas del Estado), Córdoba"
          datos: "c. 1952 · Córdoba, Argentina"
          images: [L039.png]
        texto:
          descripcion: >-
            Motocicleta Puma producida por IAME a partir de c. 1952, junto a un
            programa completo de identidad de producto: logo, denominación,
            publicidad, manuales y postventa. El nombre 'Puma' integraba el
            programa simbólico del peronismo industrial, que daba a sus
            productos nombres telúricos (Pampa, Justicialista, Rastrojero, Puma)
            para inscribirlos en un imaginario nacional vinculado al territorio
            y la fauna. La marca circuló masivamente en la Argentina de los 50 y
            luego desapareció cuando la planta IAME fue cerrada en 1980 por la
            dictadura militar. 
          cita_textual: >-
            fabricó las motocicletas 'Puma' (c. 1952), los tractores 'Pampa' (c.
            1952) y los automóviles deportivos 'Justicialista' (1953)
          estado: "Conservada en museos automotrices; documentación publicitaria dispersa"

      - imagen:
          tipo: "Diseño editorial / infografía de Estado"
          titulo: "«La Nación Argentina. Justa, libre, soberana» — libro del Primer Plan Quinquenal"
          autor: "Estado argentino / Subsecretaría de Informaciones (equipo de diseño no identificado)"
          datos: "1950 · Buenos Aires, Argentina"
          images:
            - {file: L040.png,   slot: [2, 1, 4, 5]}
            - {file: L040-4.webp, slot: [1, 6, 6, 4]}
        texto:
          descripcion: >-
            Publicación oficial de gran volumen —cerca de 800 páginas— editada
            en 1950 para presentar el macro-proyecto del Primer Plan Quinquenal
            y proyectar escenarios futuros para el país. La operación gráfica es
            deliberada y sistemática: imágenes de alto impacto, representaciones
            populares centradas en la figura de los trabajadores urbano y rural,
            textos breves y de fácil lectura, y —sobre todo— la traducción de
            complejos datos económicos, productivos y geo-políticos en
            infografías y coreografías visuales inéditas para la época. El
            objetivo declarado era el acceso popular a la información,
            incluyendo a lectores no especializados y analfabetos. Es uno de los primeros grandes ejercicios de diseño de información de Estado en la Argentina, el dato estadístico convertido en imagen pedagógica de masas.
          cita_textual: >-
            permiten analizar a lo largo de las 800 páginas el macro-proyecto
            del Primer Plan Quinquenal... los complejos datos económicos,
            productivos y geo-políticos se traducían sistemáticamente en
            infografías y coreografías inéditas para la época
          estado: "Conservada (bibliotecas nacionales y colecciones); pieza de gran formato y tirada amplia"


  # ── Sala VI ─────────────────────────────────────────────────
  - romano: "VI"
    portadilla:
      nombre: "Diseño como disciplina"
      periodo: "1949-1990"
      cita_curatorial: >-
        Desde el Boletín del CEA de 1949 hasta la revista tipoGráfica: el medio
        siglo en que el diseño gráfico argentino se nombra a sí mismo —en
        escuelas, instituciones, estudios y revistas— y se constituye como
        disciplina, no siempre con continuidad.
    piezas:
      - imagen:
          tipo: "Publicación / boletín estudiantil"
          titulo: "Boletín del Centro de Estudiantes de Arquitectura (CEA), N° 2"
          autor: "Tomás Maldonado (artículo y criterio tipográfico) / Centro de Estudiantes de Arquitectura, UBA"
          datos: "1949 · Buenos Aires, Argentina"
          images: [L041.webp]
        texto:
          descripcion: >-
            Boletín N° 2 del Centro de Estudiantes de Arquitectura
            (octubre-noviembre de 1949) donde Tomás Maldonado publicó «El diseño
            y la vida social», artículo señalado por la historia académica como
            el primero que presenta el concepto de «Diseño» en la Argentina. La
            pieza es doblemente fundante: por su contenido —que postula al
            diseño funcional como modo social de manifestarse la nueva visión— y
            por su materialidad, ya que Maldonado aplicó en ella las primeras
            tipografías sans serif (de palo seco) que había traído de su viaje a
            Suiza y Alemania en 1948. Es el documento de origen del discurso del diseño en el país, el momento exacto en que una práctica empieza a nombrarse a sí misma, antes incluso de tener escuelas, carreras o profesión.
          cita_textual: >-
            la aparición del primer artículo sobre Diseño publicado en el
            Boletín N° 2 del Centro de Estudiantes de Arquitectura escrito por
            Tomás Maldonado en 1949
          estado: "Conservado parcialmente (hemerotecas y archivos universitarios); ejemplares escasos"

      - imagen:
          tipo: "Diseño editorial / revista de cultura visual"
          titulo: "Revista nueva visión"
          autor: "Grupo axis (Tomás Maldonado, Alfredo Hlito, Carlos Méndez Mosquera) y Jorge Grisetti"
          datos: "1951-1957 · Buenos Aires, Argentina"
          images:
            - {file: L042-1.jpg, slot: [1, 1.5, 3, 4], halign: right, valign: bottom}
            - {file: L042-6.jpg, slot: [4, 1.5, 3, 4], halign: left,  valign: bottom}
            - {file: L042-4.jpg, slot: [1, 5.5, 3, 4], halign: right, valign: top}
            - {file: L042-5.jpg, slot: [4, 5.5, 3, 4], halign: left,  valign: top}
        texto:
          descripcion: >-
            Revista cuyo título homenajea a Moholy-Nagy, llevada adelante por
            los miembros de la agencia axis junto a Jorge Grisetti. Fue la
            primera publicación argentina —y latinoamericana— abocada a la
            cultura visual: inauguró la «nueva cultura visual» como campo de
            inscripción de las manifestaciones artísticas modernas y
            concretistas, integrando arte, arquitectura, diseño gráfico e
            industrial y tipografía. Su subtítulo fue mutando —«Revista de
            cultura visual, arte moderno, arquitectura, diseño, tipografía»—
            dando cuenta de esa voluntad de síntesis. A lo largo de sus nueve
            números configuró la primera voz pública y editorial del Proyecto
            Moderno en el país, y el uso de los primeros tipos de palo seco
            traídos por Maldonado la vuelve un gesto editorial absolutamente
            fundante. Es la pieza que abre, en clave editorial, una reflexión sobre la visualidad sin precedentes en Latinoamérica.
          cita_textual: >-
            La revista nueva visión (1951-1957) –título que homenajea a
            Moholy-Nagy– fue un dispositivo cultural... que inauguró la «nueva
            cultura visual»
          estado: "Conservada (9 números; hemerotecas y archivos de diseño)"

      - imagen:
          tipo: "Sistema de identidad visual / programa gráfico"
          titulo: "Sistema de identidad visual de la Feria de América"
          autor: "Tomás Maldonado (módulo gráfico) y Santiago Barbuy (desarrollo y aplicaciones)"
          datos: "1954 · Mendoza, Argentina"
          images:
            - {file: L043-1.png, slot: [1, 1.5, 3, 4], halign: left,  valign: bottom}
            - {file: L043-9.png, slot: [4, 1.5, 3, 4], halign: right, valign: bottom}
            - {file: L043-3.png, slot: [1, 5.5, 6, 4.5], valign: top}
        texto:
          descripcion: >-
            Programa gráfico integral de la Feria de América, exposición
            industrial realizada entre enero y marzo de 1954 en el Parque San
            Martín de Mendoza. La comunicación contó con Maldonado para el
            planteo del módulo gráfico, que sentó las bases del desarrollo
            visual implementado por Santiago Barbuy en una enorme diversidad de
            soportes: sellos postales, afiches, entradas, papel carta,
            reglamentos, catálogos, publicidades, señalética pública y hasta el
            carnet de autoridades. Por su magnitud, complejidad y coherencia, la
            Feria constituyó un planteo inédito en el continente y uno de los
            principales hitos interdisciplinarios del Movimiento Moderno en
            Argentina. Es una de las primeras identidades visuales completas de Latinoamérica —el sistema, no la feria—, un módulo gráfico generador desplegado con consistencia sobre diferentes de aplicaciones.
          cita_textual: >-
            Maldonado para el planteo del módulo gráfico que sentó las bases del
            desarrollo visual implementado por Barbuy en diversos soportes
            gráficos: sellos postales, afiches, entradas, papel carta,
            reglamentos, catálogos, publicidades, hasta señalética pública y
            carnet de autoridades
          estado: "Conservada parcialmente (sellos, afiches y catálogos en archivos y colecciones; arquitectura efímera desaparecida)"

      - imagen:
          tipo: "Identidad institucional, catálogos, afiches culturales"
          titulo: "Identidad y comunicación visual del Instituto Torcuato Di Tella"
          autor: "Juan Carlos Distéfano y equipo de diseño del Di Tella"
          datos: "1958-1970 · Buenos Aires, Argentina"
          images:
            - {file: L044.jpg,   slot: [2, 1.5, 4, 4], valign: bottom}
            - {file: L044-1.jpg, slot: [2, 5.5, 4, 4], valign: top}
        texto:
          descripcion: >-
            Conjunto de catálogos, afiches, programas y materiales gráficos del
            Instituto Torcuato Di Tella, especialmente del Centro de Artes
            Visuales y del Centro de Experimentación Audiovisual, dirigido en
            gran parte por el diseñador y escultor Juan Carlos Distéfano. Entre
            1958 y su cierre forzado en 1970, el Di Tella fue el laboratorio de
            la vanguardia argentina: por ahí pasaron Marta Minujín, Roberto
            Plate, Oscar Bony, Alberto Greco, las experiencias del pop, el
            happening y el video. Su comunicación visual definió un lenguaje
            moderno argentino: tipografía suiza, geometría, blanco y negro,
            escala internacional. Es el caso paradigmático del «Ulmismo» rioplatense y, a la vez, una prueba de que la modernidad gráfica argentina existió.
          cita_textual: >-
            Félix Beltrán y Juan Carlos Distéfano
          estado: "Conservada parcialmente (archivo Di Tella en UTDT, MNBA, colecciones privadas)"

      - imagen:
          tipo: "Diseño editorial / tapas y colecciones de libros populares"
          titulo: "Tapas de libros del Centro Editor de América Latina (CEAL)"
          autor: "Centro Editor de América Latina (dirección editorial de Boris Spivacow)"
          datos: "1966-1995 · Buenos Aires, Argentina"
          images:
            - {file: L045.jpg,   slot: [1, 6, 3, 4], valign: top}
            - {file: L045-1.jpg, slot: [4, 6, 3, 4], valign: top}
            - {file: L045-2.jpg, slot: [2, 1, 4, 5], valign: bottom}
        texto:
          descripcion: >-
            Conjunto de tapas y diseños de colecciones producidos por el Centro
            Editor de América Latina, editorial fundada por Boris Spivacow en
            1966 tras su renuncia a EUDEBA. CEAL publicó fascículos baratos,
            colecciones de literatura universal y argentina, historias visuales,
            capítulos de historia argentina y un sistema editorial que llegó a
            kioscos, escuelas y barrios donde nunca había llegado un libro. El
            diseño —firmado por equipos rotativos de jóvenes diseñadores—
            sostuvo durante tres décadas una idea radical: que el libro popular
            podía tener calidad gráfica sin disfrazarse de objeto de lujo. La
            dictadura militar incineró parte del fondo en 1980 (el famoso
            'tendal de Sarandí') y el cierre llegó en 1995 por quiebra.
          cita_textual: >-
            las tapas de los libros del Centro Editor de América Latina de la
            década de los 80
          estado: "Conservada parcialmente (bibliotecas, hemerotecas); fondo editorial parcialmente quemado por la dictadura"

      - imagen:
          tipo: "Diseño editorial / revista de arquitectura, tecnología y diseño"
          titulo: "Revista Summa"
          autor: "Carlos Méndez Mosquera (fundador) / Ediciones Summa — diseño editorial: Sara Torossian"
          datos: "1963-1989 · Buenos Aires, Argentina"
          images: [L046.jpg]
        texto:
          descripcion: >-
            Revista fundada por el arquitecto Carlos Méndez Mosquera en abril de
            1963 con la intención de suplir la carencia, a nivel nacional y
            latinoamericano, de un medio de comunicación de alto nivel sobre
            arquitectura, tecnología y diseño. A lo largo de tres décadas Summa
            se convirtió en un referente ineludible del campo editorial
            argentino y en el espacio donde aparece por primera vez planteada la
            distinción incipiente entre Diseño Industrial y Diseño Gráfico. Sus
            decisiones de diseño —formato, puesta en página, articulación
            texto/imagen, a cargo del diseño editorial de Sara Torossian— eran
            parte esencial de sus contenidos. En el recorte 1963-1989, es una pieza clave de un campo que empieza a pensarse a sí mismo, la publicación donde el diseño deja de ser subsidiario de la arquitectura y reclama un territorio propio.
          cita_textual: >-
            Fundada por el Arq. Carlos Méndez Mosquera en abril de 1963, Summa
            nace con la intención primordial de suplir la carencia, a nivel
            nacional y latinoamericano, de un medio de comunicación... en los
            temas de arquitectura, tecnología y diseño
          estado: "Conservada (colección extensa; hemerotecas y archivos de arquitectura)"

      - imagen:
          tipo: "Diseño editorial / revista de diseño"
          titulo: "Revista tipoGráfica (tpG)"
          autor: "Rubén Fontana y Roberto Alvarado (dirección) / Ediciones de Diseño"
          datos: "1987-1989 · Buenos Aires, Argentina"
          images:
            - {file: L047-2.jpg,  slot: [1, 1.5, 3, 4], halign: left,  valign: bottom}
            - {file: L047-6.jpg,  slot: [4, 1.5, 3, 4], halign: right, valign: bottom}
            - {file: L047-10.png, slot: [1, 5.5, 6, 4.5], valign: top}
        texto:
          descripcion: >-
            Con el subtítulo «comunicación para diseñadores» y la definición
            «revista de diseño», en julio de 1987 apareció el primer número de
            tipoGráfica, publicada por Ediciones de Diseño y dirigida por
            Roberto Alvarado y Rubén Fontana. La revista fue resultado del
            crecimiento explosivo de las artes visuales hacia mediados de los
            años ochenta y del cambio en el rol que la sociedad otorgaba a las
            disciplinas del diseño; su pulso late en sincronía con la recién
            creada carrera de Diseño Gráfico en la FADU-UBA (1984). El cuidado
            puesto en la elección y calidad tipográfica —la elección recae en el
            alfabeto Frutiger—, la organización visual de la información, el
            manejo de blancos, el papel y la impresión eran funcionales a la
            idea de diseño y de diseñador con la que se identificaba su editor.
            Es el emblema del momento en que el diseño gráfico argentino se piensa, se enseña y se nombra como disciplina autónoma.
          cita_textual: >-
            Con el subtítulo comunicación para diseñadores y la definición
            revista de diseño, aparece, en julio de 1987, el primer número de
            TipoGráfica
          estado: "Conservada (colección de Ediciones de Diseño; archivos de diseño)"

      - imagen:
          tipo: "Sistema de señalización urbana"
          titulo: "Señalética urbana de Buenos Aires (Estudio Shakespeare)"
          autor: "Raúl Shakespeare y Ronald Shakespeare"
          datos: "1971-1990 · Buenos Aires, Argentina"
          images:
            - {file: L048.jpg,   slot: [1, 1, 6, 5], valign: bottom}
            - {file: L048-1.jpg, slot: [1, 6, 4, 4], fit: cover}
            - {file: L048-2.jpg, slot: [5, 6, 2, 4], fit: cover}
        texto:
          descripcion: >-
            Sistema de señalización urbana de la Ciudad de Buenos Aires diseñado
            por el estudio Shakespeare a partir de 1971, y posteriormente
            extendido a autopistas, hospitales, aeropuertos y subterráneos. Los
            Shakespeare —hermanos de origen británico— resolvieron por primera
            vez en escala metropolitana sudamericana el problema de la
            legibilidad a velocidad: tipografía sans-serif normalizada,
            pictogramas reducidos a su esquema mínimo, sistema cromático
            estable. Buena parte de las señales todavía en uso hoy en Buenos
            Aires son herederas directas de ese diseño. Es una pieza paradójica. Está literalmente en la calle, sometida al desgaste cotidiano y al recambio inadvertido, y precisamente por eso es de las menos conservadas. Cada vez que un cartel se reemplaza, una versión del Buenos Aires gráfico moderno desaparece sin que nadie tome nota.
          cita_textual: >-
            Eduardo Giménez y Raúl y Ronald Shakespeare
          estado: "En uso urbano; pieza expuesta a desgaste y reemplazo continuo"


  # ── Sala VII ─────────────────────────────────────────────────
  - romano: "VII"
    portadilla:
      nombre: "Gráfica, música y contracultura"
      periodo: "1969-1972"
      cita_curatorial: >-
        Con la irrupción del rock nacional nace una gráfica de tapa que 
        oscila entre el músico-artista y el diseñador profesional. De la 
        ilustración críptica de Spinetta para Almendra al sello de 
        vanguardia Mandioca, el disco se vuelve soporte de 
        experimentación visual.
    piezas:
      - imagen:
          tipo: "Diseño discográfico / tapa de disco"
          titulo: "Tapa del álbum «Almendra», de Almendra"
          autor: "Luis Alberto Spinetta (ilustración) — sello RCA Vik"
          datos: "1969 · Buenos Aires, Argentina"
          images: [L049.png]
        texto:
          descripcion: >-
            Tapa del disco homónimo debut de Almendra (1969), uno de los álbumes
            históricos del rock argentino y una de sus primeras manifestaciones
            gráficas. La ilustración de carpeta fue un dibujo del propio Luis
            Alberto Spinetta que no se entendía a simple vista —los
            especialistas lo llaman «críptico»—: el cantante buscaba una imagen
            metafórica sobre la tristeza, encarnada en la lágrima que derrama el
            personaje «Fermín». La discográfica RCA Vik se opuso y pretendía
            continuar con el clásico uso fotográfico de la banda para asegurar
            ventas; los músicos insistieron con el dibujo precisamente para
            romper el estándar de cubiertas de la época. Es el acta de nacimiento de la gráfica del rock nacional, la primera vez que un músico-autor impone una ilustración propia contra el criterio comercial del sello.
          cita_textual: >-
            La ilustración de carpeta de Almendra fue un dibujo de Spinetta que
            no se entendía a simple vista y que los especialistas... llaman
            «críptico»
          estado: "Conservada (ediciones discográficas y reediciones; pieza de circulación masiva)"

      - imagen:
          tipo: "Diseño discográfico / tapa de disco"
          titulo: "Tapa del álbum «Manal», de Manal"
          autor: "Daniel Melgarejo y Rodolfo Binaghi — sello Mandioca"
          datos: "1969 · Buenos Aires, Argentina"
          images: [L050.jpg]
        texto:
          descripcion: >-
            Tapa del disco debut de Manal (1969), editado por el sello Mandioca.
            La imagen —una bomba de tiempo realizada con técnicas de collage
            sobre las fotografías de los músicos— fue un trabajo de Daniel
            Melgarejo y Rodolfo Binaghi, e inicia la serie de los primeros
            profesionales de oficio dedicados al diseño discográfico argentino.
            Melgarejo, como muchos de su generación, no era exactamente un
            «diseñador» sino un artista plástico, caricaturista, ilustrador y
            animador autodidacta. A diferencia de las grandes discográficas,
            Mandioca había dado total libertad de acción y una especial
            valoración por el «arte de tapa», lo que la posicionó pronto como el
            sello de vanguardia. Es un ejemplo del lenguaje persuasivo y político del collage rockero, que captó —según sus autores— el «clima opresivo» de fines de los sesenta bajo la dictadura de Onganía.
          cita_textual: >-
            La tapa era una bomba de tiempo realizada con técnicas de collage
            con las fotografías de los músicos, un trabajo de Daniel Melgarejo y
            Rodolfo Binaghi
          estado: "Conservada (ediciones discográficas y reediciones)"

      - imagen:
          tipo: "Diseño discográfico / tapa de disco"
          titulo: "Tapa del álbum «Pidamos peras a Mandioca», de artistas varios"
          autor: "Daniel Melgarejo y Billy Bond — sello Mandioca"
          datos: "1970 · Buenos Aires, Argentina"
          images: [L051.jpg]
        texto:
          descripcion: >-
            Tapa del compilado editado por el sello Mandioca en 1970. La pieza
            es una clara apropiación de la banana de Andy Warhol —diseñada para
            The Velvet Underground & Nico— pero con condimentos locales: Jorge
            Álvarez, Pedro Pujó y Melgarejo eran confesos peronistas, y Billy
            Bond explicaba que «es una gran pera, pero más bien es un Perón».
            Frente a la dictadura de Onganía, el compilado jugaba con esa
            sutileza desde la tapa. Bond y Melgarejo pensaron una fruta resuelta
            con tipografía manuscrita: la apropiación opera tanto en lo
            morfológico —una fruta en la zona central— como en lo tipográfico
            —el recurso a la letra script—. Es un caso paradigmático de apropiación local del pop art, el rock argentino retomando a Warhol para decir, en clave cifrada, lo que la censura no permitía decir.
          cita_textual: >-
            Pidamos peras a Mandioca es una clara apropiación de la banana de
            Warhol, pero con condimentos locales
          estado: "Conservada parcialmente (ediciones discográficas; pieza de colección)"

      - imagen:
          tipo: "Diseño discográfico / tapa de disco"
          titulo: "Tapa del álbum «Pappo's Blues», de Pappo's Blues"
          autor: "Cristina Villamor — sello Music Hall"
          datos: "1972 · Buenos Aires, Argentina"
          images: [L052.jpg]
        texto:
          descripcion: >-
            Tapa del primer disco de Pappo's Blues (1972), resuelta con los
            recursos del arte psicodélico, muy extendido en esos años. Creada
            por la artista plástica y escenógrafa Cristina Villamor, muestra a
            un mago-hechicero en medio de un sueño alucinógeno. La pieza se vale
            de formas turbulentas y tipografías deformadas: al resignar
            legibilidad, gana en desempeño visual, con el contraste de colores
            como recurso clave. La gráfica psicodélica abrevaba en el art
            nouveau —sus curvas sinuosas y fluidas— y en el op art —sus bloques
            de color y efectos de ilusión óptica—; si en su origen
            estadounidense tenía un fuerte componente político, la apropiación
            local vació ese sentido para quedar como pura estética. Es un ejemplo de la psicodelia rioplatense, una contracultura visual que llega importada y se reescribe en clave local.
          cita_textual: >-
            Creada por la artista plástica y escenógrafa Cristina Villamor,
            muestra a un mago-hechicero en medio de un sueño alucinógeno de
            drogas y delirio
          estado: "Conservada (ediciones discográficas y reediciones)"


  # ── Sala VIII ─────────────────────────────────────────────────
  - romano: "VIII"
    portadilla:
      nombre: "Diseño, instituciones y cultura pop"
      periodo: "1960-1983"
      cita_curatorial: >-
        Los años sesenta y setenta: el diseño entra en las empresas, las
        instituciones y la universidad, y la cultura pop —de la historieta al Di
        Tella— ocupa la calle. La modernización convive con los golpes
        militares, la censura y la protesta.
    piezas:
      - imagen:
          tipo: "Marca / identidad corporativa y agencia de diseño"
          titulo: "Logotipo Siam y la agencia de diseño Agens"
          autor: "Grupo Onda (logotipo, 1960) / Agens (agencia interdisciplinaria, 1962)"
          datos: "1960-1972 · Buenos Aires, Argentina"
          images:
            - {file: L053-1.jpg, slot: [1, 1, 3, 3]}
            - {file: L053-2.jpg, slot: [4, 1, 3, 3]}
            - {file: L053-4.jpg, slot: [2, 4, 4, 4], valign: bottom}
            - {file: L053.jpg,   slot: [1, 8, 6, 2], valign: top}
        texto:
          descripcion: >-
            El Grupo Onda, ganador del concurso de 1960, desarrolló el logotipo
            de Siam Di Tella y su manual de aplicaciones, así como las marcas
            del automóvil Di Tella 1500 y del Instituto Torcuato Di Tella. En
            1962, la compañía —por entonces el grupo industrial más grande de
            Latinoamérica— creó Agens, una agencia interna de diseño
            interdisciplinario que reunió redactores, fotógrafos, diseñadores y
            arquitectos para planear campañas publicitarias, packagings,
            productos, stands y pabellones feriales. Inédita para el medio,
            Agens funcionó además como una escuela para sus integrantes.  Es un caso temprano de identidad corporativa argentina concebida con manual de normas, y de la articulación pionera entre producción industrial y diseño de comunicación dentro de una misma empresa.
          cita_textual: >-
            el Grupo Onda —ganador del concurso de 1960— quien desarrolló el
            logotipo Siam y su manual de aplicaciones... En 1962 se creó la
            agencia interna de diseño interdisciplinario Agens
          estado: "Conservada parcialmente (manuales y piezas dispersas en archivos de diseño)"

      - imagen:
          tipo: "Identidad institucional / sistema gráfico"
          titulo: "Identidad visual del CIDI (Centro de Investigación del Diseño Industrial)"
          autor: "Basilio Uribe (isologotipo, asesoría de Carlos Fracchia) y María Luisa Facorro de Colmenero (sistema gráfico)"
          datos: "1962-1972 · Buenos Aires, Argentina"
          images:
            - {file: L054.jpg,   slot: [1, 1, 3, 4]}
            - {file: L054-3.png, slot: [4, 1, 3, 4]}
            - {file: L054-3.jpg, slot: [1, 5, 6, 5]}
        texto:
          descripcion: >-
            Programa de identidad visual del CIDI, organismo semipúblico que
            funcionó entre 1962 y 1988 bajo la órbita del INTI para promover el
            diseño y la industria nacional mediante concursos, exposiciones y
            seminarios. El isologotipo fue diseñado por Basilio Uribe con la
            asesoría de Carlos Fracchia; la diseñadora gráfica María Luisa
            Facorro de Colmenero desarrolló entre 1967 y 1972 la imagen integral
            del centro: papelería institucional, afiches, catálogos y un sistema
            de exposiciones de aplicación constante. Documenta uno de los primeros sistemas de identidad de una institución argentina dedicada al propio diseño. El CIDI puso la disciplina en la agenda de empresarios y consumidores, y su comunicación visual fue, en sí misma, un argumento a favor de la profesión.
          cita_textual: >-
            El isologotipo fue diseñado por Basilio Uribe, con la asesoría de
            Carlos Fracchia. María Luisa Facorro de Colmenero fue la diseñadora
            gráfica del CIDI... Desarrolló la imagen integral del centro
          estado: "Conservada parcialmente (archivos del INTI y de diseño; el CIDI cerró en 1988)"

      - imagen:
          tipo: "Diseño expositivo / sistema de panelería modular"
          titulo: "Sistema expositivo de la 1ª Bienal Mundial de la Historieta"
          autor: "Estudio Diseño Buenos Aires (panelería modular); Rodolfo Möller, Augusto Brengio y Antonio Gache (diseño expositivo)"
          datos: "1968 · Buenos Aires, Argentina"
          images: [L055.png]
        texto:
          descripcion: >-
            Sistema modular y diseño expositivo creado para la Primera Bienal
            Mundial de la Historieta, organizada en 1968 conjuntamente por la
            Escuela Panamericana de Arte y el Instituto Torcuato Di Tella, e
            impulsada por David Lipszyc y el teórico Oscar Masotta. La
            exposición —presentada entre octubre y noviembre de 1968 en la sede
            del ITDT (Florida 936) e itinerante luego en ciudades de Argentina y
            América Latina— requirió un soporte expositivo a medida: el estudio
            Diseño Buenos Aires resolvió la panelería modular y los arquitectos
            Rodolfo Möller, Augusto Brengio y Antonio Gache se encargaron del
            diseño expositivo. Es uno de los primeros casos documentados de diseño expositivo argentino concebido como sistema modular, un dispositivo en el que el diseño deja la página y la marca para organizar el espacio cultural.
          cita_textual: >-
            se diseñó un sistema de panelería modular (ideado por el estudio
            Diseño Buenos Aires) y un diseño expositivo por Rodolfo Möller,
            Augusto Brengio y Antonio Gache
          estado: "Conservada parcialmente (catálogos y registros fotográficos de la exposición; panelería no preservada)"

      - imagen:
          tipo: "Gráfica de activismo / campaña contrainformativa"
          titulo: "Gráfica de Tucumán Arde"
          autor: "Colectivo Tucumán Arde (artistas, periodistas y sociólogos)"
          datos: "1968 · Rosario / Buenos Aires / Tucumán, Argentina"
          images:
            - {file: L056-1.jpg, slot: [2, 1, 4, 5]}
            - {file: L056.jpg,   slot: [1, 6, 6, 4]}
        texto:
          descripcion: >-
            Conjunto de piezas gráficas producidas en noviembre de 1968 por
            Tucumán Arde, un colectivo multidisciplinario de artistas,
            periodistas y sociólogos que realizó acciones simultáneas en las
            sedes de la CGT de los Argentinos para denunciar la privatización de
            los ingenios azucareros tucumanos y la pobreza que provocaba. El
            proyecto incluyó afiches urbanos, anuncios en los medios y la
            exhibición de la 1ª Bienal de Arte de Vanguardia en Rosario y Buenos
            Aires —clausurada el mismo día de su inauguración—. Entre sus
            integrantes estuvieron León Ferrari, Roberto Jacoby, Graciela
            Carnevale y Margarita Paksa.
          cita_textual: >-
            El proyecto incluyó afiches urbanos, anuncios en los medios, y la
            exhibición de la 1º Bienal de Arte de Vanguardia en Rosario y en
            Buenos Aires (clausurada el mismo día de la inauguración)
          estado: "Conservada parcialmente (Archivo Graciela Carnevale; documentación dispersa)"


  # ── Sala IX ─────────────────────────────────────────────────
  - romano: "IX"
    portadilla:
      nombre: "Marcas, señales y sistemas"
      periodo: "1972-1997"
      cita_curatorial: >-
        Las décadas del setenta y el ochenta: marcas, señales y sistemas cubren
        el espacio público mientras el país atraviesa la dictadura, la guerra y
        el retorno de la democracia. El Mundial '78 y la campaña de Alfonsín
        marcan los dos extremos del período.
    piezas:
      - imagen:
          tipo: "Marca / isologotipo de evento"
          titulo: "Isologotipo oficial del Mundial '78"
          autor: "Juan Riera (1973); antecedente de Guillermo González Ruiz y Ronald Shakespear (1972)"
          datos: "1973-1978 · Buenos Aires, Argentina"
          images: [L057-1.png]
        texto:
          descripcion: >-
            Marca oficial de la Copa Mundial de Fútbol de 1978. En 1972 la AFA
            organizó el primer concurso nacional para el emblema mundialista,
            que ganaron Guillermo González Ruiz y Ronald Shakespear; esa marca
            se usó solo en la promoción previa. En 1973, bajo la órbita de López
            Rega, el joven Juan Riera diseñó la marca representativa que circuló
            internacionalmente: una abstracción del planisferio de Hammer
            rematada por dos bandas que rodean la pelota. Riera pensó esas
            bandas como un ícono de la cartografía moderna, pero López Rega las
            leía como los brazos de Perón. Con la última dictadura, el Ente
            Autárquico Mundial '78 adoptó el isologotipo sin modificarlo. Es un caso denso del diseño argentino, una marca de origen democrático que la dictadura se apropió como herramienta de su política de imagen.
          cita_textual: >-
            En 1973, bajo la órbita de López Rega... el joven Juan Riera diseñó
            la marca representativa que circuló internacionalmente
          estado: "Conservada (marca de circulación masiva; documentación amplia)"

      - imagen:
          tipo: "Mascota / personaje ilustrado / merchandising"
          titulo: "Mascota oficial del Mundial '78: «El Gauchito»"
          autor: "Néstor Córdoba (ilustración)"
          datos: "1978 · Buenos Aires, Argentina"
          images: [L058.jpg]
        texto:
          descripcion: >-
            Mascota oficial de la Copa Mundial de Fútbol de 1978: un personaje
            criollo —«El Gauchito»— ilustrado por el dibujante Néstor Córdoba,
            que representaba a un jugador de fútbol con sombrero gaucho, pañuelo
            al cuello, fusta-banderín y la pelota junto al pie. La mascota pobló
            los álbumes de figuritas Panini, el merchandising oficial del torneo
            y la cultura visual cotidiana del campeonato, circulando masivamente
            en los hogares argentinos durante 1978. El Gauchito fue su rostro doméstico, un personaje que circuló por fuera del control proyectual del diseño moderno y se instaló en la memoria afectiva del país.
          cita_textual: >-
            También se creó la «mascota» del mundial: un gauchito del dibujante
            Néstor Córdoba, jugador criollo que pobló los álbumes de figuritas y
            merchandising
          estado: "Conservada (figuritas, álbumes y merchandising en colecciones; ediciones contemporáneas)"

      - imagen:
          tipo: "Familia tipográfica / diseño de fuentes"
          titulo: "Familia tipográfica «Zootype»"
          autor: "Víctor García"
          datos: "1984-1997 · Buenos Aires, Argentina"
          images: [L061.jpeg]
        texto:
          descripcion: >-
            Familia tipográfica diseñada por el tipógrafo Víctor García cuyo germen fue el logotipo de la campaña ecológica «Por Toda La Vida» (1984), creado para Diners Club junto a la Fundación Vida Silvestre Argentina: las letras estaban conformadas con especímenes estilizados de fauna autóctona. De ese trabajo derivó Zootype, donde se ven las influencias del pensamiento «no alfabético» y pictográfico de García, y que fue la primera fuente tipográfica latinoamericana premiada en el 2.º Concurso Internacional de Diseño Tipográfico de Linotype (1997). Es un hito de la tipografía latinoamericana, un diseño que reclama un lugar propio para la producción tipográfica de la región y convierte la fauna del territorio en sistema de escritura.
          cita_textual: >-
            constituyeron el germen de los diseños de la familia tipográfica
            «Zootype», la primera fuente latinoamericana premiada en el 2º
            Concurso Internacional de Diseño Tipográfico de Linotype (1997)
          estado: "Disponible (fuente digital; documentación en concursos internacionales)"

      - imagen:
          tipo: "Familia tipográfica / diseño de fuentes"
          titulo: "Tipografía «Fontana tpG»"
          autor: "Rubén Fontana (FontanaDiseño)"
          datos: "1995-2007 · Buenos Aires, Argentina"
          images:
            - {file: L062-1.webp, slot: [1, 1.5, 6, 4], fit: cover}
            - {file: L062.jpg,    slot: [1, 5.5, 6, 4], fit: cover}
        texto:
          descripcion: >-
            Familia tipográfica diseñada por Rubén Fontana y aplicada desde 1995
            a la revista tipoGráfica (tpG), publicación independiente de diseño
            que se editó ininterrumpidamente entre 1987 y 2007. El uso de una
            tipografía propia —en lugar de una fuente comercial estándar— era un
            gesto coherente con el programa de la revista: dotar al diseño
            gráfico argentino de un lenguaje propio, no subsidiario del catálogo
            tipográfico europeo. Fontana, integrante histórico del departamento
            de diseño del Instituto Torcuato Di Tella y fundador junto a Zalma
            Jalluf del estudio FontanaDiseño, fue uno de los referentes
            centrales del diseño tipográfico argentino contemporáneo
            —responsable también del rediseño de la marca YPF (2007) y de
            campañas para grandes instituciones del país—. Es un caso paradigmático del diseño tipográfico al servicio de un proyecto editorial. La tipografía funciona como rasgo identitario de la publicación, una operación posible solo cuando la disciplina alcanza la autonomía para diseñar sus propias herramientas.
          cita_textual: >-
            Desde 1995, utilizó su propia tipografía (Fontana tpG), evolucionó
            hasta encuadernación con lomo e impresión a todo color
          estado: "Disponible (tipografía utilizada en revista tpG; archivos del estudio Fontana)"

      - imagen:
          tipo: "Infografía / cartografía periodística"
          titulo: "Infografías de la Guerra de Malvinas (Alejandro Malofiej)"
          autor: "Alejandro Malofiej"
          datos: "1982 · Buenos Aires, Argentina"
          images: [L063.jpg]
        texto:
          descripcion: >-
            Mapas e infografías realizados por el cartógrafo Alejandro Malofiej
            (Buenos Aires, 1938-1987) para el diario Tiempo Argentino durante la
            Guerra de Malvinas de 1982. Frente a la información tendenciosa y
            triunfalista que dominaba los medios —que titulaban «¡Estamos
            ganando!» mientras se perdía la guerra—, Malofiej optó por la
            información técnica y una visión documentalista, traduciendo el
            conflicto en cartografía y datos. Es un antecedente fundacional de la infografía periodística argentina y latinoamericana. Tan determinante fue su aporte que el premio internacional más importante del género —considerado los Pulitzer de la infografía— lleva hoy su nombre.
          cita_textual: >-
            el cartógrafo Alejandro Malofiej (Buenos Aires, 1938-1987) realizó
            para Tiempo Argentino mapas e infografías, incorporando una visión
            documentalista
          estado: "Conservada parcialmente (hemerotecas; ediciones de Tiempo Argentino)"

      - imagen:
          tipo: "Marca política / identidad de campaña"
          titulo: "Marca de campaña presidencial de Raúl Alfonsín («RA»)"
          autor: "Guillermo González Ruiz (marca) / David Ratto Publicidad (campaña)"
          datos: "1983 · Buenos Aires, Argentina"
          images:
            - {file: L064-1.jpg, slot: [1, 1, 3, 4], halign: left,  valign: bottom}
            - {file: L064-2.jpg, slot: [4, 1, 3, 4], halign: right, valign: bottom}
            - {file: L064.jpg,   slot: [1, 5, 6, 4.5], valign: top}
        texto:
          descripcion: >-
            Marca de la campaña presidencial de Raúl Alfonsín en 1983, diseñada
            por Guillermo González Ruiz para la campaña de la UCR conducida por
            la agencia David Ratto Publicidad y apoyada en el eslogan «Ahora
            Alfonsín. El hombre que hace falta». La sigla «RA» asociaba las
            iniciales del candidato con las de la República Argentina, en una
            operación de identificación entre la figura política y la nación
            recién recuperada para la democracia. Es un ejemplo temprano y eficaz del diseño aplicado a la comunicación política argentina, una marca sintética y memorable que opera por condensación de sentidos, en el umbral de la «primavera democrática».
          cita_textual: >-
            La marca del candidato fue diseñada por Guillermo González Ruiz,
            cuya sigla «RA» asociaba sus iniciales con las de la República
            Argentina
          estado: "Conservada (documentación de campaña; pieza de circulación masiva)"

      - imagen:
          tipo: "Diseño editorial / libro"
          titulo: "Libro «Nunca Más» (informe de la CONADEP)"
          autor: "Eudeba (Editorial Universitaria de Buenos Aires) / CONADEP"
          datos: "1984 · Buenos Aires, Argentina"
          fondo: negro            # exception: pure-black bg (artwork is heavily red)
          images: [L065.jpg]
        texto:
          descripcion: >-
            Edición del informe de la Comisión Nacional sobre la Desaparición de
            Personas (CONADEP), publicada por Eudeba en noviembre de 1984. El
            libro —una síntesis de 500 páginas de los testimonios recopilados
            durante nueve meses, presidida la comisión por Ernesto Sábato— se
            editó en una tirada inicial de 40.000 ejemplares que se agotó en las
            primeras 48 horas de venta. Es uno de los libros más decisivos de la historia argentina reciente, un objeto editorial cuyo diseño —sobrio, urgente, de circulación masiva— estuvo al servicio de hacer pública e irreversible la verdad sobre el terrorismo de Estado, y un testimonio del papel del diseño editorial en la construcción de la memoria.
          cita_textual: >-
            Eudeba publicó el libro Nunca más, una síntesis de 500 páginas de
            los testimonios en una tirada de 40.000 ejemplares agotados en las
            primeras 48 horas de venta
          estado: "Conservada (numerosas ediciones y reimpresiones)"


  # ── Sala X ─────────────────────────────────────────────────
  - romano: "X"
    portadilla:
      nombre: "Identidad, infografía y activismo"
      periodo: "1989-2010"
      cita_curatorial: >-
        Del menemismo al Bicentenario: identidad de marca, rebranding de las
        empresas privatizadas, infografía periodística premiada en el mundo y
        una gráfica social que disputa sentido. El diseño argentino se
        profesionaliza y se globaliza.
    piezas:
      - imagen:
          tipo: "Marca política / identidad de campaña"
          titulo: "Marca de campaña presidencial de Carlos Menem"
          autor: "Martín Mazzei"
          datos: "1989 · Buenos Aires, Argentina"
          images: [L066.jpg]
        texto:
          descripcion: >-
            Marca de la campaña presidencial de Carlos Menem en 1989, diseñada
            por Martín Mazzei, especialista en comunicación política. El sistema
            gráfico se apoyó en una marca sintética y pregnante: Mazzei quitó la
            cara del candidato para posar toda la comunicación en el logotipo,
            una banda presidencial que atravesaba la letra «N» en el centro del
            apellido. La operación apuntaba a captar al electorado independiente
            no peronista. Funciona como contrapunto de la marca «RA» de Alfonsín. Dos campañas presidenciales sucesivas resueltas por una marca abstracta y memorable, indicio de la consolidación del diseño de comunicación política en la Argentina.
          cita_textual: >-
            El sistema gráfico se apoyó en una marca sintética y pregnante
            diseñada por Martín Mazzei... una banda presidencial que atravesaba
            la letra «N» en el centro del apellido
          estado: "Conservada (documentación de campaña; pieza de circulación masiva)"

      - imagen:
          tipo: "Identidad corporativa / rebranding"
          titulo: "Identidad de marca de YPF (FontanaDiseño)"
          autor: "FontanaDiseño (Rubén Fontana y Zalma Jalluf)"
          datos: "2004-2012 · Buenos Aires, Argentina"
          images:
            - {file: L067-1.png, slot: [1, 1, 6, 4], valign: bottom}
            - {file: L067.png,   slot: [1, 5, 6, 5], valign: top}
        texto:
          descripcion: >-
            Programa de identidad de marca de YPF desarrollado por
            FontanaDiseño. Tras la privatización de los años 90 —cuando la
            conducción descartó la marca histórica y se perdió el icónico
            escudo—, y la fusión con la imagen española como Repsol YPF, el
            estudio de Rubén Fontana y Zalma Jalluf proyectó en 2007 una
            estrategia integral que la propia empresa definió como la
            «argentinización de la marca». El nuevo programa reajustó la marca,
            optimizó la reproducción del sistema y quitó la comunicación
            compartida con Repsol para preservar los rasgos más valorados de la
            identidad; la intervención había comenzado en 2004 con el rediseño
            de las tiendas Full. Un caso testigo del ciclo argentino de privatización, extranjerización y reestatización leído a través de una marca.
          cita_textual: >-
            La actual identidad marcaria de YPF fue diseñada en 2007 por
            FontanaDiseño de Rubén Fontana & Zalma Jalluf... la «argentinización
            de la marca»
          estado: "Conservada (marca en uso; documentación de FontanaDiseño)"

      - imagen:
          tipo: "Infografía / diseño de información"
          titulo: "Departamento de Infografía del diario Clarín"
          autor: "Departamento de Infografía de Clarín (dir. Jaime Serra, 1994-2001; Alejandro Tumas y Pablo Loscri desde 2001)"
          datos: "1993-2001 · Buenos Aires, Argentina"
          images:
            - {file: L068-1.png, slot: [1, 1.5, 6, 4], valign: bottom}
            - {file: L068-4.png, slot: [1, 5.5, 6, 4], valign: top}
        texto:
          descripcion: >-
            Producción del Departamento de Infografía del diario Clarín, creado
            en 1993 en el marco del rediseño del diario y como novedad para los
            medios locales. Iniciado por Michel Gafré y Xavier Conesa y dirigido
            desde 1994 por el español Jaime Serra, el departamento generó un
            punto de inflexión al sumar un equipo especializado en ilustración,
            comunicación e investigación. Serra entendía la infografía como una
            herramienta comunicacional que expresaba los datos mediante
            metáforas visuales; el lenguaje resultante —con ilustraciones
            realistas, maquetas y fotografías— pronto se convirtió en el «estilo
            Clarín» y obtuvo numerosas distinciones del Premio Malofiej. El momento en que la infografía argentina alcanza reconocimiento mundial y deja de ser graficación del dato duro para volverse un género narrativo y autoral.
          cita_textual: >-
            Fue el diario Clarín quien revolucionó este género al incorporarlo
            sistemáticamente a sus páginas... se estableció el Departamento de
            Infografía, una novedad para los medios locales
          estado: "Conservada (hemerotecas; archivos del diario)"

      - imagen:
          tipo: "Marca / identidad de evento"
          titulo: "Marca y emblema oficial del Bicentenario argentino"
          autor: "Juan Pablo Tredicce, Hernán Berdichevsky y Gustavo Stecher"
          datos: "2010 · Buenos Aires, Argentina"
          images:
            - {file: L069-1.png, halign: right}
            - {file: L069-2.png, halign: left}
            - {file: L069-3.png, halign: left}
            - {file: L069-4.png}
        texto:
          descripcion: >-
            Marca y emblema oficial del Bicentenario de la Revolución de Mayo,
            diseñados por concurso público por Juan Pablo Tredicce, Hernán
            Berdichevsky y Gustavo Stecher para los festejos de mayo de 2010,
            que reunieron a más de seis millones de personas. La identidad se
            aplicó a la comunicación de los festejos, a la estampilla del Correo
            Argentino, a monedas conmemorativas y al conjunto de eventos que
            ocuparon el espacio público. Doscientos años después de los primeros impresos revolucionarios, el Estado convoca a sus diseñadores por concurso abierto para construir la imagen de la efeméride —contrapunto deliberado del primer sello postal y de la gráfica de la Revolución de las primeras salas.
          cita_textual: >-
            el diseño de marca y emblema oficial —diseñado, por concurso
            público, por Juan Pablo Tredicce, Hernán Berdichevsky y Gustavo
            Stecher—
          estado: "Conservada (documentación oficial; aplicaciones diversas)"


  # ── Sala XI ─────────────────────────────────────────────────
  - romano: "XI"
    portadilla:
      nombre: "Gráfica del activismo"
      periodo: "1966-2020"
      cita_curatorial: >-
        El giro gráfico: la gráfica como práctica política, cultural y
        comunitaria. Talleres, brigadas, colectivos y diseñadores autorales de
        toda Latinoamérica que hacen de la serigrafía, el afiche, el bordado, el
        cartel y el pop andino herramientas de construcción colectiva, por
        dentro y por fuera del campo del arte.
    piezas:
      - imagen:
          tipo: "Afiche político / cartelismo de solidaridad"
          titulo: "Carteles de la OSPAAAL"
          autor: "OSPAAAL — Organización de Solidaridad de los Pueblos de Asia, África y América Latina (entre otros, Alfredo Rostgaard)"
          datos: "1966-1990 · La Habana, Cuba"
          images:
            - {file: L070.png,   slot: [1, 5, 3, 5], valign: top}
            - {file: L070-1.png, slot: [1, 1, 6, 4]}
            - {file: L070-2.png, slot: [4, 5, 3, 5], valign: top}
        texto:
          descripcion: >-
            Corpus de carteles producidos por la OSPAAAL (Organización de Solidaridad de los Pueblos de Asia, África y América Latina), fundada en La Habana en 1966. Sus afiches —difundidos plegados en el interior de la revista Tricontinental y, por esa vía, distribuidos por todo el mundo— articularon una iconografía antiimperialista y de solidaridad entre los pueblos del Sur, con un lenguaje de gran síntesis cromática en el que se destacó el diseñador Alfredo Rostgaard. Es uno de los nodos fundacionales de la gráfica de activismo latinoamericana, el momento en que el afiche se vuelve herramienta de internacionalismo, capaz de circular por fuera del campo del arte.
          cita_textual: >-
            La clave antiimperialista y de solidaridad entre los pueblos
            —convocada por la OSPAAAL (Organización de Solidaridad de los
            Pueblos de Asia, África y América Latina) en Cuba—
          estado: "Conservada parcialmente (colecciones de cartelismo; revista Tricontinental)"

      - imagen:
          tipo: "Serie de afiches / pop andino"
          titulo: "Serie «Pop achorado»: afiches para la Reforma Agraria del Perú"
          autor: "Jesús Ruiz Durand"
          datos: "1969-1971 · Lima, Perú"
          images: [L071.png, L071-1.png, L071-2.png]
        texto:
          descripcion: >-
           Serie de afiches diseñada por el artista peruano Jesús Ruiz Durand entre 1969 y 1971, en el marco de un equipo de comunicaciones al servicio de la Reforma Agraria peruana. Ruiz Durand bautizó la serie como «pop achorado», fusionando la estética del pop art con la insolencia o desfachatez del campesinado mestizo andino: «achorado» es una palabra de uso cotidiano en Perú, Bolivia y Chile que implica moverse por un ímpetu insumiso. Un caso paradigmático del giro gráfico latinoamericano de los años setenta y una evidencia de que, en América Latina, el pop no es importación sino reapropiación: el campo entra al lenguaje pop y lo modifica desde sus iconografías mestizas y sus reivindicaciones territoriales.
          cita_textual: >-
            Entre 1969 y 1971, el artista Jesús Ruiz Durand integró un equipo de
            comunicaciones al servicio de la reforma agraria en Perú... La serie
            de afiches se denominó «pop achorado», asumiendo la insolencia o acá
            diríamos la insumisión de los movimientos de reorganización
            territorial andinos por campesinos mestizos
          estado: "Conservada parcialmente (archivos del autor; colecciones de gráfica política latinoamericana)"

      - imagen:
          tipo: "Serigrafía / gráfica de activismo"
          titulo: "Gráfica del Taller 4 Rojo"
          autor: "Taller 4 Rojo (entre otros, Diego Arango y Nirma Zárate)"
          datos: "1972-1976 · Bogotá, Colombia"
          images: [L072.jpeg]
        texto:
          descripcion: >-
            Producción del Taller 4 Rojo, colectivo de gráfica política que funcionó en Colombia entre 1972 y 1976. El taller integró la práctica artística con la lucha política, poniendo la imagen al servicio de las demandas populares y antiimperialistas de la época. Es uno de los episodios centrales del «giro gráfico» latinoamericano —ese proceso en que, a lo largo de los setenta, talleres y colectivos de toda la región redefinieron el arte gráfico desde la práctica política— y parte de la apuesta del museo por una historia genuinamente latinoamericana, no solo argentina.
          cita_textual: >-
            el Taller 4 Rojo (1972-1976) en Colombia... la redefinición del arte
            gráfico desde la práctica política
          estado: "Conservada parcialmente (archivos y colecciones de arte y militancia)"

      - imagen:
          tipo: "Bordado colectivo / acción gráfica textil"
          titulo: "Bordadoras transnacionales: colectivos de México, El Salvador, Colombia, Chile y Argentina"
          autor: "Colectivos de bordadoras de México, El Salvador, Colombia, Chile y Argentina (autoras múltiples y anónimas)"
          datos: "2010-2020 · varias, México / El Salvador / Colombia / Chile / Argentina"
          images:
            - {file: L073.png,   slot: [2, 1.5, 4, 4], valign: bottom}
            - {file: L073-1.png, slot: [2, 5.5, 4, 4], valign: top}
        texto:
          descripcion: >-
            Red de colectivos de bordadoras de cinco países latinoamericanos —México, El Salvador, Colombia, Chile y Argentina— que tomaron una técnica tradicionalmente recluida en el ámbito privado del hogar y la convirtieron en herramienta pública: bordan rostros, nombres y biografías de las víctimas de la violencia para reclamar justicia ante el anonimato de la negación oficial. Una técnica artesanal e íntima se vuelve lenguaje gráfico-político transnacional. Con gesto lento y sostenido, las bordadoras inscriben en tela —puntada por puntada— aquello que el Estado se niega a escribir.
          cita_textual: >-
            un encuentro entre colectivos de bordadoras de México, El Salvador,
            Colombia, Chile y Argentina, esas que —con gesto lento y sostenido—
            apelan a una técnica tradicionalmente recluida en el ámbito privado
            del hogar y la convierten en potente herramienta pública y
            aglutinadora de comunidades micropolíticas
          estado: "Conservada (mantas en colectivos, exhibiciones itinerantes y archivos militantes)"

      - imagen:
          tipo: "Gráfica de activismo / estampa y bordado"
          titulo: "Gráfica del proyecto Zapantera Negra"
          autor: "Emory Douglas y comunidades zapatistas (mujeres bordadoras)"
          datos: "2012-2014 · Chiapas, México"
          images:
            - {file: L074-2.jpg, slot: [1, 1, 3, 9]}
            - {file: L074-1.jpg, slot: [4, 1, 3, 4], fit: cover}
            - {file: L074.jpg,   slot: [4, 5, 3, 5], halign: left, valign: top}
        texto:
          descripcion: >-
            Experiencia gráfica realizada entre 2012 y 2014 a partir del encuentro entre Emory Douglas —artista gráfico que fue ministro de Cultura del Partido de las Panteras Negras— y comunidades zapatistas de Chiapas, en el centro cultural EDELO de San Cristóbal de las Casas. Mujeres bordadoras intervinieron viejos afiches de Douglas y nuevas imágenes creadas junto a jóvenes zapatistas, cruzando el imaginario visual de las Panteras Negras —ligado a la historia de esclavitud, racismo y represión policial contra la población negra estadounidense— con las luchas rurales de las comunidades mayas. Es un encuentro de temporalidades. La velocidad serializada de la estampa y la lentitud artesanal del bordado comunitario se anudan, como dos «saberes hacer», en una gráfica pasafronteras, anticapitalista y antirrepresiva.
          cita_textual: >-
            Mujeres bordadoras intervinieron sus viejos afiches y también nuevas
            imágenes gráficas creadas entre el artista y jóvenes zapatistas...
            la impronta de las imágenes de Zapantera Negra
          estado: "Conservada parcialmente (proyecto documentado; piezas en comunidades y colecciones)"


  # ── Sala XII ─────────────────────────────────────────────────
  - romano: "XII"
    portadilla:
      nombre: "El sello postal argentino"
      periodo: "1856-2005"
      cita_curatorial: >-
        El sello postal —la pieza de diseño gráfico de mayor circulación 
        masiva del país— casi nunca entra en la historia del diseño. 
        Del primer sello correntino de 1856 a las grandes series 
        conmemorativas del patrimonio nacional, la sala recorre siglo 
        y medio de gráfica de Estado en pocos centímetros cuadrados.
    piezas:
      - imagen:
          tipo: "Sello postal / pieza filatélica"
          titulo: "Primer sello postal argentino (Corrientes)"
          autor: "Matías Pipet (diseño y grabado de las planchas)"
          datos: "1856 · Corrientes, Argentina"
          images: [L076.jpg]
        texto:
          descripcion: >-
            Primer sello postal puesto en circulación en el territorio argentino, emitido en la provincia de Corrientes tras la ley de agosto de 1856 que estableció el impuesto postal y el franqueo previo y obligatorio de la correspondencia. El diseño y grabado de las planchas estuvo a cargo del inmigrante francés Matías Pipet, mediante impresión tipográfica: impreso en papel de seda, en tinta negra y con el contorno liso, lleva la efigie de la diosa Ceres. Marca el punto de partida de una larga tradición gráfica de Estado. El sello postal es una de las piezas de diseño de circulación más masiva y a la vez más invisibilizada de la historia argentina.
          cita_textual: >-
            El diseño y grabado de las planchas de la primera estampilla
            argentina estuvo a cargo de un inmigrante francés, Matías Pipet, y
            fue realizado por medio de la impresión tipográfica... La estampilla
            tenía la efigie de la Diosa Ceres
          estado: "Conservada parcialmente (colecciones filatélicas; pieza rara y muy buscada)"

      - imagen:
          tipo: "Serie filatélica / programa de sellos conmemorativos"
          titulo: "Serie «Próceres y Riquezas Nacionales»"
          autor: "Correo Argentino (equipo de diseño filatélico, autores no identificados individualmente)"
          datos: "1954-1958 · Buenos Aires, Argentina"
          images:
            - {file: L077.webp,  slot: [1, 1, 6, 5], valign: bottom}
            - {file: L077-2.png, slot: [1, 6, 2, 2.37], valign: top, halign: left}
            - {file: L077-3.png, slot: [3, 6, 2, 2.37], valign: top}
            - {file: L077-4.png, slot: [5, 6, 2, 2.37], valign: top, halign: right}
        texto:
          descripcion: >-
            Programa filatélico iniciado en los años cincuenta que usó la estampilla como inventario del territorio nacional: bajo el título «Próceres y Riquezas Nacionales», cada sello funcionaba como una pequeña ventana al patrimonio del país. La emisión documentada es la dedicada a la Quebrada de Humahuaca (1954-1958), valle andino del noroeste que el sello adelantó por casi medio siglo en la patrimonialización del paisaje: el sitio fue declarado Patrimonio Mundial de la Humanidad por la UNESCO recién en 2003. Uno de los primeros grandes programas filatélicos argentinos pensados como dispositivo de construcción identitaria.
          cita_textual: >-
            II SERIE DE PRÓCERES Y RIQUEZAS NACIONALES — Quebrada de Humahuaca —
            Año de Emisión: 1954/1958
          estado: "Conservada (catálogos filatélicos del Correo Argentino; colecciones)"

      - imagen:
          tipo: "Series filatélicas / sellos conmemorativos del patrimonio natural"
          titulo: "Series del patrimonio natural argentino"
          autor: "Correo Argentino (equipos de diseño filatélico)"
          datos: "1971-2004 · Buenos Aires, Argentina"
          images:
            - {file: L078-1.png, slot: [1, 1.5, 6, 4], valign: bottom}
            - {file: L078.png,   slot: [1, 5.5, 6, 3], valign: top}
        texto:
          descripcion: >-
            Conjunto de programas filatélicos que continuaron la operación de inventariar el territorio, ahora con foco en el patrimonio natural: «Riqueza Austral — Tierra del Fuego» (1971), «Ballenas y Delfines — Delfín del Río de la Plata» (2001), «Paisaje de la Argentina II» (2004) y «Bosques Nativos Argentinos» (2004). Cada emisión propone un fragmento del país —una especie, un paisaje, un ecosistema— como bien nacional digno de circular masivamente, anticipando o acompañando declaraciones de Patrimonio Mundial UNESCO como las de los Glaciares Argentinos (1981) y la Quebrada de Humahuaca (2003).
          cita_textual: >-
            RIQUEZA NATURAL. Tierra del Fuego (1971); BALLENAS Y DELFINES —
            Delfín del Río de la Plata (2001); PAISAJE DE LA ARGENTINA II
            (2004); Bosques Nativos Argentinos (2004)
          estado: "Conservada (catálogos filatélicos del Correo Argentino; colecciones)"

      - imagen:
          tipo: "Series filatélicas / retrato político y conmemoraciones"
          titulo: "Series Eva Perón en estampillas"
          autor: "Correo Argentino (equipos de diseño filatélico)"
          datos: "1960-2002 · Buenos Aires, Argentina"
          images:
            - {file: L079-1.jpg, slot: [1, 1, 3, 4], valign: bottom}
            - {file: L079-3.jpg, slot: [4, 1, 3, 4], valign: bottom}
            - {file: L079-4.png, slot: [2, 5, 4, 5], valign: top}
        texto:
          descripcion: >-
            Conjunto de programas filatélicos dedicados a la figura de María Eva Duarte de Perón a lo largo de cuatro décadas. La emisión original de c. 1960 presenta el retrato de Evita en primer plano con composición axial; tiene además un dato fortísimo: una de sus tiradas circuló con el nombre del país mal impreso —«Argfentina» en lugar de «Argentina»—, error tipográfico que la convirtió en pieza buscadísima entre coleccionistas. En 2002, por el 50.º aniversario del fallecimiento, el Correo emitió varias variantes del retrato —subtituladas «Eva», «Lucha», «Olvido», «Pronunciando un discurso»—, en un programa iconográfico que reescribe la figura del peronismo a través del tiempo.
          cita_textual: >-
            Argentina emitió una serie de Eva Perón que llevaba el nombre del
            país mal escrito: «Argfentina». — Aniversario del Fallecimiento de
            María Eva Duarte De Perón (2002, c. Eva / Lucha / Olvido /
            Pronunciando un discurso)
          estado: "Conservada (catálogos filatélicos; emisión 1960 con error «Argfentina» como pieza de coleccionismo)"

      - imagen:
          tipo: "Sellos conmemorativos / serie meta-reflexiva"
          titulo: "Sellos conmemorativos críticos"
          autor: "Correo Argentino (equipos de diseño filatélico)"
          datos: "1986-2005 · Buenos Aires, Argentina"
          images:
            - {file: L080-2.png, slot: [1, 1, 6, 4]}
            - {file: L080-4.png, slot: [1, 5, 2, 2.5], halign: left, valign: top}
            - {file: L080-1.png, slot: [1, 7, 2, 3], halign: left, valign: bottom}
            - {file: L080.png,   slot: [3, 5, 4, 5]}
        texto:
          descripcion: >-
            Tres emisiones que ejemplifican el «conmemorativo crítico»: estampillas en las que el Estado pone a circular sellos sobre temas que en su momento combatió o sobre el propio diseño. «Arquitectura e Historia» (1986) revisa el legado nacionalista de principios de siglo; «Anarquía del año '20» (1999) conmemora un movimiento que el Estado había reprimido; y la serie «Diseño Argentino — Diseño Gráfico» (2005) lleva al Correo a emitir sellos sobre el propio diseño gráfico. Después de siglo y medio circulando como objeto utilitario, el sello se vuelve sobre sí mismo y se autonombra como diseño.
          cita_textual: >-
            ARQUITECTURA E HISTORIA — Restauración Nacionalista 1910-1930
            (1986); «Anarquía del año '20» (1999); DISEÑO ARGENTINO — Diseño
            Gráfico (2005, serie de 4)
          estado: "Conservada (catálogos filatélicos del Correo Argentino; colecciones)"

      - imagen:
          tipo: "Series filatélicas / sellos sobre cultura inmaterial"
          titulo: "Series del patrimonio cultural inmaterial argentino"
          autor: "Correo Argentino (emisión 1999 conjunta con La Poste, Francia)"
          datos: "1999-2005 · Buenos Aires, Argentina"
          images: [L081.jpg]
        texto:
          descripcion: >-
            Programas filatélicos que ponen como sujeto los bienes culturales no materiales —música, ritos, expresiones populares y patrimonio originario— en lugar del paisaje o el prócer. «Nuevo Milenio: La Música Popular — El Tango» (1999), serie de seis estampillas que sintetiza con un lenguaje gráfico abstracto los elementos del tango y que fue una de las primeras emisiones bilaterales del Correo, en colaboración con La Poste de Francia; y «Pueblos Indígenas II — Vaso Antropomorfo Ciénaga» (2000), con artesanías y motivos de las culturas originarias del territorio. Marca el momento en que el Correo construye, en pocos centímetros, un inventario de qué cuenta como cultura argentina inmaterial. Lo que el sello canoniza opera, de hecho, como patrimonio.
          cita_textual: >-
            NUEVO MILENIO. LA MÚSICA POPULAR. El Tango (1999, emisión conjunta
            Argentina-Francia); PUEBLOS INDÍGENAS II — Vaso Antropomorfo Ciénaga
            (2000)
          estado: "Conservada (catálogos filatélicos del Correo Argentino; colecciones)"

