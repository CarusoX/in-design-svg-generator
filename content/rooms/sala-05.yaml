  tipo: Revista mensual ilustrada
  titulo_pieza: Plus Ultra (suplemento mensual de Caras y Caretas)
  autor: Staff de Caras y Caretas (Pellicer, Cao, Mayol, Giménez)
  datos: 1916-1930 · Buenos Aires, Argentina
  image: images/sala-05/pieza-09.jpg
  descripcion: |-
    Suplemento mensual de Caras y Caretas publicado entre 1916 y 1930. A diferencia del semanario, que privilegiaba la actualidad y el humor satírico, Plus Ultra apuntó al diseño editorial cuidado, la identidad gráfica propia y la reproducción de obras del Museo Nacional de Bellas Artes y de colecciones privadas argentinas. La revista funcionó como puente entre la cultura impresa masiva y el circuito artístico legitimado: usó la misma infraestructura industrial de Caras y Caretas (Compañía Sud-Americana de Billetes de Banco) pero compuso un objeto de circulación más lenta, más pesado, más caro y destinado a un público con mayor capital cultural. El archivo lo retiene como ejemplo de la primera operación argentina de diferenciación editorial dentro de una misma empresa: la industria gráfica empezando a segmentar audiencias.
  cita_textual: |-
    Plus Ultra (1916-1930) fue un suplemento mensual de la revista donde colaboraba todo el staff del semanario
