  titulo_pieza: Identidad Siam Di Tella (1910-1960)
  autor: Siam Di Tella (Sociedad Italiana de Amasadoras Mecánicas)
  datos: 1910-1960 · Buenos Aires (planta en Avellaneda), Argentina
  image: images/sala-05/pieza-04.jpg
  descripcion: |-
    Sistema de identidad gráfica de Siam Di Tella, empresa fundada en 1910 como Sociedad Italiana de Amasadoras Mecánicas. La firma produjo el primer surtidor de nafta argentino (1912), bombas, motores eléctricos, las motocicletas Siambretta (c. 1954) y el automóvil Siam Di Tella 1500 (1960). En 1952 inauguró un local de venta en la calle Florida, en la misma cuadra donde seis años después se instalaría el Instituto Torcuato Di Tella. La operación gráfica de Siam fue ejemplar para una empresa privada argentina de la primera mitad del siglo XX: aplicaciones unificadas en surtidores YPF, fábricas, máquinas, motocicletas, automóviles, publicidad y puntos de venta. El archivo retiene la pieza como caso paradigmático del primer diseño corporativo argentino sistemático, y como antecedente directo del Di Tella institucional.
