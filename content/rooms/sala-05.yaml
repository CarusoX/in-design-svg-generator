  tipo: Estudio fotográfico / agencia de publicidad
  titulo_pieza: Estudio fotográfico y publicitario 'Grete y Horacio Coppola'
  autor: |-
    Grete Stern (Alemania, 1904 - Buenos Aires, 1999) y Horacio Coppola (Buenos Aires, 1906 - 2012)
  datos: 1935-c. 1955 · Buenos Aires, Argentina
  image: images/sala-05/pieza-12.jpg
  descripcion: |-
    Estudio fotográfico y publicitario abierto en Buenos Aires por Grete Stern y Horacio Coppola tras su llegada al país en 1935, escapando del régimen nazi. La pareja se había conocido en 1932 en las clases de fotografía de la Bauhaus de Berlín bajo Walter Peterhans; trabajaron primero en Londres y arribaron a Buenos Aires con todo el bagaje técnico y conceptual de la última Bauhaus. El estudio aplicó al mercado publicitario porteño técnicas que en Buenos Aires no se habían visto: fotomontaje constructivista, 'foto-tipo' (combinación de fotografía y tipografía), tipografía sans-serif moderna, retícula. El archivo retiene el estudio como punto exacto de llegada de la Bauhaus al Río de la Plata: no a través de un manual ni una escuela, sino a través de un matrimonio de fotógrafos que abrió oficina y empezó a trabajar.
  cita_textual: Inauguran el estudio fotográfico y publicitario 'Grete y Horacio Coppola'
  fuente: MALBA (col. Costantini); archivos Coppola; libros publicados sobre Stern
