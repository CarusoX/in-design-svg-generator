  image: images/sala-05/pieza-01.jpg
  descripcion: |-
    Almanaque fundado en 1901 por el austríaco M. Sundt como pequeño folleto de 80 páginas; llegó a las 356 páginas y se mantuvo en publicación hasta al menos 1931 bajo la editora 'Viuda de Sundt'. Combinaba calendario y almanaque, reseña de todos los Estados independientes del mundo, historia del año, guía oficial con datos estadísticos de población y educación, miscelánea, atlas, tarifas y fórmulas para distintos usos —desde calcular sueldos hasta convertir pesos y medidas. Premiado con diploma y medalla de oro en la Exposición de Artes Gráficas del Centenario (1916). Lüsebrink lo describiría como 'máquina textual': un dispositivo de orientación en el tiempo, el espacio, la historia y los saberes útiles. El archivo lo retiene como caso paradigmático del almanaque rioplatense del primer tercio del siglo XX: género popular, ilustrado, masivo y casi siempre descartado por sus propios lectores al terminar el año.
  cita_textual: |-
    El Almanaque del Mensajero salió por primera vez en 1901, y 1931 fue posiblemente el último año de publicación de esta serie por parte de la editora Sundt
