- cabecera_id: Sala V · Pieza 03
  cabecera_sub: L034
  tipo: Página interior con espacios manuscritos
  titulo_pieza: Página 'Tabla cronológica' del Almanaque del Mensajero
  autor: M. Sundt (editor)
  datos: 1909 y siguientes · Buenos Aires, Argentina
  image: images/sala-05/pieza-03.jpg
  descripcion: |-
    Página interior del Almanaque del Mensajero diseñada para ser completada manualmente por el lector. Contenía corazones y escudos en blanco donde el comprador debía escribir los nombres de su genealogía familiar empezando por los bisabuelos; en la página siguiente, titulada 'Crónica de familia', se anotaban los acontecimientos familiares del año. La operación editorial es elocuente: el almanaque comprado en la librería se completaba en casa con la propia historia. Eso convirtió a cada ejemplar en pieza única una vez usada. Mosqueda documenta un caso conservado: el almanaque de 1917 lleva las anotaciones manuscritas de un tal Arturo Luna, argentino, con los nombres de sus bisabuelos, abuelos y la fecha de su boda (4 de octubre de 1916). La pieza es paradigmática del archivo: un objeto editorial pensado para volverse propiedad escrita del usuario, donde la línea entre editor y lector se vuelve porosa.
  cita_textual: |-
    el Almanaque incluía una tabla cronológica con corazones y escudos en blanco que el lector debía completar con los datos de su familia
  fuente: Ejemplar manuscrito de Arturo Luna (1917) referenciado por Mosqueda
