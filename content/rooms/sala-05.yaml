    Obra ilustrativa del español Alejandro Sirio (1890-1953), llegado a Buenos Aires en 1910 y considerado por la historiografía del diseño argentino como uno de los pocos ilustradores de la primera mitad del siglo XX que practicó una operación verdaderamente integral: combinó dibujo, tipografía y puesta en página en una unidad de diseño, en una época en que esas tareas las hacían profesionales distintos. Trabajó para Caras y Caretas, Plus Ultra, Mundo Argentino, La Nación y para editoriales como Atlántida y Peuser. Sus ilustraciones para los cuentos de Horacio Quiroga y para crónicas de viajes son hoy referencias canónicas. El archivo retiene la obra como ejemplo paradigmático del ilustrador que opera como diseñador gráfico antes de que la disciplina exista institucionalmente en Argentina.
