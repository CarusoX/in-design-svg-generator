  tipo: Identidad institucional / sistema gráfico de empresa pública
  titulo_pieza: Identidad gráfica YPF (símbolo y aplicaciones tempranas)
  autor: YPF (Yacimientos Petrolíferos Fiscales) con desarrollo gráfico colaborativo
  datos: 1922-1955 · Buenos Aires, Argentina
  image: images/sala-05/pieza-05.jpg
  descripcion: |-
    Sistema de identidad gráfica de YPF, primera empresa petrolera estatal del mundo, fundada en 1922. El símbolo gráfico fue aplicado en escalas múltiples —papelería institucional, surtidores, fachadas de estaciones, vehículos de reparto, publicidad en revistas— en lo que constituye una de las primeras operaciones argentinas de identidad corporativa sostenida. La pieza es archivísticamente compleja: las estaciones de servicio fueron construidas en estilos arquitectónicos diversos (racionalista, art deco, pintoresquista) según las regiones y décadas, pero todas exhibían el mismo símbolo gráfico. El archivo retiene la identidad como ejemplo del primer caso latinoamericano de sistema gráfico aplicado a una empresa pública de escala nacional, y como pieza que sigue mutando: cada actualización del logo borra la anterior, y la identidad histórica sobrevive sólo en fotografías y archivos publicitarios.
  cita_textual: |-
    El símbolo gráfico de YPF se aplicó a diversas escalas en publicidades y en los múltiples espacios de venta
  fuente: Archivo corporativo YPF, AGN, fotos de estaciones art déco
