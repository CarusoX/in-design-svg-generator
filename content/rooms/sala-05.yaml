  tipo: Libro ilustrado / repertorio decorativo
  titulo_pieza: Silabario de la decoración americana
  autor: Ricardo Rojas
  datos: 1930 · Buenos Aires, Argentina
  image: images/sala-05/pieza-11.jpg
  descripcion: |-
    Libro publicado por Ricardo Rojas en 1930 como sistematización gráfica de los motivos decorativos americanos derivados del arte precolombino. La obra cataloga, clasifica y reproduce greca por greca el repertorio iconográfico de las culturas originarias del continente, con el objetivo declarado de poner a disposición de diseñadores, artistas, arquitectos y maestros un alfabeto visual americano alternativo al repertorio decorativo europeo. La publicación dialoga con el Silabario de Manuel Antonio Carreño y con los catálogos ornamentales de Owen Jones y Ernst Haeckel, pero opera con materiales que esos catálogos europeos habían omitido. El archivo lo retiene como ejemplo paradigmático de operación archivística desde adentro: Rojas no espera que un museo conserve el repertorio americano, lo cataloga él mismo en formato editorial.
