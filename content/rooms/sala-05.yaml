  tipo: Almanaque literario y enciclopédico
  titulo_pieza: El Pasatiempo. Almanaque literario, ilustrado, noticioso
  autor: Editorial Peuser (Buenos Aires)
  datos: 1904 y siguientes · Buenos Aires, Argentina
  image: images/sala-05/pieza-02.jpg
  descripcion: |-
    Almanaque editado por la Editorial Peuser a partir de 1904, deliberadamente concebido como adaptación al mercado porteño de un homónimo español, El pasatiempo. Almanaque humorístico, literario y científico publicado desde 1869. La operación editorial es elocuente: la versión argentina suprime el tono humorístico del original español, elimina la firma del 'almanaquero' que en España firmaba el conjunto y se presenta como un producto editorial puro. Incluye cuentos, rimas, biografías, crónicas de viajes por la Argentina, fragmentos de novelas, prólogos y agenda mensual a doble página para que el lector escribiera. Las páginas internas funcionaban además como catálogo de la propia editorial Peuser: en la retiración de tapa y contratapa se promocionaban los libros disponibles como 'regalos esencialmente a propósito para Navidad y Año Nuevo'. El archivo lo retiene como muestra de la transición del almanaque-fórmula editorial al almanaque-catálogo comercial.
  cita_textual: |-
    El Pasatiempo (1904) ofrecía —luego de las secciones fijas— una miscelánea de cuentos, rimas, biografías, crónicas de viajes
