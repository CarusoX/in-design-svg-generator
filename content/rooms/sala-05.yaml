  titulo_pieza: Identidades de marcas iconográficas argentinas (1930-1950)
  autor: Estudios y agencias varias (locales e internacionales)
  datos: 1930-1950 · Buenos Aires, Argentina
  image: images/sala-05/pieza-07.jpg
  descripcion: |-
    Conjunto de identidades visuales de las marcas que constituyeron el repertorio iconográfico cotidiano de la Argentina de la ISI: Philips, Siemens, cigarrillos Sublimes y París, Cinzano, Bols, Fernet Branca, Chocolate Águila, Canale, Bagley, Terrabusi. Algunas eran marcas internacionales adaptadas (Philips, Siemens, Cinzano), otras locales (Águila, Canale, Bagley, Terrabusi). El sistema publicitario de la época —afiches en estaciones de tren y vagones, avisos en revistas, concursos de carteles, jingles radiales— las hizo presentes en todos los hogares argentinos durante dos décadas. El archivo las retiene como conjunto porque la operación gráfica de identidad de marca a gran escala se consolidó en la Argentina de los años 30-40 antes de que existieran las primeras escuelas de diseño: el saber se transmitía por talleres y agencias, no por academias.
