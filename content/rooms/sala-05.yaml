  tipo: Afiches publicitarios / cartelería
  titulo_pieza: Campaña publicitaria 'Geniol' de Lucien Achille Mauzan
  autor: Lucien Achille Mauzan
  datos: c. 1925-1940 · Buenos Aires, Argentina (Mauzan nacido en Francia)
  image: images/sala-05/pieza-06.jpg
  descripcion: |-
    Campaña publicitaria para el medicamento Geniol diseñada por el ilustrador francés Lucien Achille Mauzan, radicado en Buenos Aires durante los años 20 y 30. La iconografía —el rostro deformado por el dolor de cabeza, con la mano en la sien, en gran formato y colores saturados— se convirtió en una de las imágenes publicitarias más reconocibles de la Argentina del siglo XX. Mauzan había trabajado antes en Italia y Francia y aplicó al mercado porteño las técnicas del cartel europeo de gran formato (Cappiello, Cassandre). La pieza es un caso paradigmático del traslado tecnológico de la publicidad europea al Río de la Plata por vía de la inmigración profesional. El archivo retiene la campaña como ejemplo del momento en que la publicidad argentina dejó de ser texto y empezó a ser imagen.
  cita_textual: figuras como Lucien Achille Mauzan (publicidad Geniol)
  fuente: Corpus Mauzan ampliamente reproducido. Museo Nacional del Cartel
