  tipo: Manual escolar ilustrado
  titulo_pieza: Viracocha (manual escolar)
  autor: |-
    Editado por Curt Berger y Cía.; diseño del escultor Gonzalo Leguizamón Pondal y el arquitecto Alberto Gelly Cantilo
  datos: 1923 · Buenos Aires, Argentina
  image: images/sala-05/pieza-10.jpg
  descripcion: |-
    Manual escolar publicado por Curt Berger y Cía. en 1923, con diseño del escultor Gonzalo Leguizamón Pondal y el arquitecto Alberto Gelly Cantilo. Sistematizó el dibujo decorativo americano para ser enseñado en las escuelas primarias argentinas. Recibió la Medalla de Oro del VI Salón Nacional de Arte Decorativo y, por decisión del Consejo Nacional de Educación, fue adoptado para la enseñanza de la plástica. La operación es notable: un manual de circulación masiva escolar puso en manos de cada chico argentino, durante varios años, un repertorio iconográfico precolombino transformado en propuesta pedagógica nacional. La pieza materializa en formato escolar el programa que Rojas había anunciado en Eurindia un año antes. El archivo lo conserva como prueba de que el indigenismo cultural argentino no fue sólo un debate de élite: efectivamente bajó a las aulas, en cuadernos ornamentados con grecas calchaquíes y motivos diaguitas.
  cita_textual: |-
    el manual escolar Viracocha, editado por Curt Berger y Cía en 1923, el hito educativo que permite sistematizar el dibujo decorativo americano
