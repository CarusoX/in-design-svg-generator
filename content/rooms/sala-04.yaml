    Serie de caricaturas inaugurada por José María Cao en Caras y Caretas en enero de 1900: una galería de retratos satíricos de las personalidades eminentes de la política y la cultura argentina, publicada semana a semana en tapa o doble página interior. La operación editorial era nueva en el Río de la Plata: la caricatura política dejaba de ser ilustración suelta y se volvía colección sistemática. La primera entrega estuvo dedicada a Bartolomé Mitre (13 de enero de 1900); la segunda, a Julio A. Roca (20 de enero de 1900). El contraste era deliberado: Mitre apareció como prohombre de gloria militar, política y literaria; Roca, una semana después, ataviado con ropas eclesiásticas y rodeado de incondicionales. El archivo retiene la serie como pieza-sistema: la primera operación argentina de retrato político seriado, antecedente directo de la fotonovela y de las galerías de personajes del siglo XX.
