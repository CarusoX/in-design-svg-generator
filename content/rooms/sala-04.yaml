  descripcion: |-
    Doble página publicada en Caras y Caretas el 8 de agosto de 1903 contra la Convención de Notables que iba a elegir al sucesor de Roca. Foto trucada que presentaba a los electores con ropajes eclesiásticos, como si se tratara de la elección de un Papa. El epígrafe explicaba: 'Aquí tenemos también, como en Roma, un cónclave electoral, y estamos seguros de que en cada uno de los purpurados dormita un candidato presidencial, como en cada uno de los cardenales, un papa...'. La pieza es archivísticamente excepcional por dos razones: documenta una de las primeras operaciones de fotomontaje político en el Río de la Plata, y registra la posición editorial de Caras y Caretas frente a la maquinaria sucesoria del roquismo. El archivo retiene el fotomontaje como antecedente directo de las técnicas que medio siglo después adoptarían Grete Stern y la propaganda peronista.
