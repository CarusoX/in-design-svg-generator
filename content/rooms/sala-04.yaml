  descripcion: |-
    Ilustración satírica publicada en Caras y Caretas el 13 de septiembre de 1902, a propósito del escándalo del traslado de los restos de Manuel Belgrano a una nueva sepultura. La crónica denunciaba que los ministros de Guerra e Interior, Pablo Riccheri y Joaquín V. González, se habían llevado piezas dentarias del prócer como recuerdo durante la ceremonia oficial. La página siguiente desarrollaba el hecho en clave gráfica: una ilustración mostraba a Belgrano levantándose de la tumba y reclamando a los dos ministros 'Hasta los dientes me llevan! ¿No tendrán bastante con los propios para comer del presupuesto?'. El archivo retiene la pieza como ejemplo paradigmático de la operación humorística de Caras y Caretas: convertir un episodio puntual en escándalo nacional vía dibujo satírico, generalizar la falta moral a todo el régimen.
