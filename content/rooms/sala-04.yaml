    Versión montevideana original de Caras y Caretas, fundada por Pellicer en 1890 ocho años antes que su par porteña. Operada con el dibujante alsaciano Charles Schultz, ensayó por primera vez la fórmula que después arrasaría en Buenos Aires: actualidad ilustrada, humor, sátira política suave, folletín, publicidad. Una de sus operaciones más interesantes fue la primera novela colectiva impresa del Río de la Plata, 'Por seguir a un galgo' (1890), escrita por siete autores rotativos —Daniel Muñoz, Alfredo Duhau, Ricardo Usher Blanco, Enrique Lemos, José Artal, Víctor Arreguine y el propio Pellicer— donde cada uno escribía un capítulo a partir del final del anterior, con el mandato explícito de complicarle la continuidad al siguiente. El archivo retiene la pieza como laboratorio uruguayo de la fórmula editorial argentina más exitosa.
