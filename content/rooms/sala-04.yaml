  descripcion: |-
    Semanario satírico de caricaturas fundado por el español Eduardo Sojo en 1884 y publicado durante diecinueve años hasta 1903. Don Quijote llevó la caricatura política argentina a niveles inéditos de virulencia contra el régimen roquista; en su mejor momento, los gobiernos lo persiguieron, lo censuraron y lo demandaron sin lograr cerrarlo. El semanario formó la primera generación de caricaturistas profesionales del Río de la Plata: José María Cao ('Demócrito II') y Manuel Mayol ('Heráclito') aprendieron el oficio en sus páginas antes de pasar masivamente a Caras y Caretas en 1898. Don Quijote y Caras y Caretas funcionaron durante cinco años como las dos revistas-modelo del periodismo gráfico argentino, una más virulenta y otra más popular; el cierre de Don Quijote en 1903 dejó a Caras y Caretas como única heredera. El archivo lo retiene como pieza fundacional del periodismo satírico argentino.
