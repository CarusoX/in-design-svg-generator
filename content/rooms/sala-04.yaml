  image: images/sala-04/pieza-09.jpg
  descripcion: |-
    Tapa de Caras y Caretas de enero de 1903 dibujada por Manuel Mayol, crítica a la recientemente aprobada Ley de Residencia (4144), que facultaba al Poder Ejecutivo a expulsar del país a cualquier extranjero considerado peligroso para el orden público. La ley había sido sancionada en noviembre de 1902 en respuesta al conflicto obrero y a la presencia anarquista en los puertos. La tapa de Mayol —que la revista discutió ampliamente en sus páginas interiores— marcó la posición de Caras y Caretas frente a una de las herramientas represivas más duras del régimen conservador. El archivo retiene la tapa como momento bisagra: la revista, que durante sus primeros años había practicado la sátira política suave, se vio obligada a tomar posición frente a un conflicto que tocaba directamente a su público inmigrante.
