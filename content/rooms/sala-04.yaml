  image: images/sala-04/pieza-11.jpg
  descripcion: |-
    Inauguración del folletín en Caras y Caretas en agosto de 1904, en respuesta a la pérdida de exclusividad de la revista en la oferta fotográfica (los diarios habían empezado a incorporar fotos). La nueva sección consolidó un sistema editorial híbrido: novelas por entregas con ilustraciones específicas, traducidas, recicladas o de producción propia. Los títulos iniciales incluyeron 'La pesquisa', 'La última pesquisa' de Arthur Conan Doyle, 'El robo de los dos millones' de Rafael Barreda, 'El falso inca' de Roberto Payró, 'El teniente coronel Fray Luis Beltrán' de Eduardo de la Barra, 'El diario de Eva' de Mark Twain, 'La tapera del cuervo' de Javier de Viana. El archivo retiene el conjunto como ejemplo de la flexibilidad estructural de la revista masiva argentina: ante la presión competitiva, mutación inmediata del formato sin perder identidad.
