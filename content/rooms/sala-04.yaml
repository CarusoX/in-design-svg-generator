  image: images/sala-04/pieza-03.jpg
  descripcion: |-
    Publicación ilustrada producida por la imprenta policial de Buenos Aires en 1887, atribuida a José Sixto Álvarez ('Fray Mocho'), entonces subcomisario y luego fundador editorial de Caras y Caretas. La obra tenía un objetivo institucional concreto: fijar, mediante la fotografía y la descripción individualizada, los rostros y rasgos de los delincuentes registrados de la ciudad, para uso del personal policial y eventualmente del público. La 'Galería' es el primer compendio iconográfico argentino producido específicamente para vigilancia masiva: combina foto, texto y dispositivo de archivo en una operación editorial que anticipa los métodos del fichaje policial moderno. El archivo retiene la pieza como antecedente paradójico del propio Fray Mocho: el mismo hombre que organizó visualmente la vigilancia popular fue, una década después, el director de la revista que dio voz humorística a esa misma cultura popular vigilada.
