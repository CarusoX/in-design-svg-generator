  descripcion: |-
    Tapa de Caras y Caretas N° 16, publicada el 29 de octubre de 1898 con dibujo de José María Cao. Caricatura del general Roca representado como Luis XIV, sentado en un trono con peluca y ropajes del rey francés, cortando con una tijera el mapa de la Puna de Atacama. La estrofa satírica al pie firma el mensaje: 'La cuestión de la Puna de Atacama / por su cuenta arregló, / diciendo lo que dijo Luis XIV: / El Estado soy yo'. La pieza es el primer ataque frontal de Caras y Caretas a Roca, lanzado apenas dos semanas después del primer número de la revista. Inaugura una operación que la revista practicaría durante toda la presidencia: critica al presidente vía iconografía europea —Luis XIV, Felipe II, papas, Napoleones— para vincular sus prácticas con el absolutismo. El archivo retiene la tapa como caso paradigmático del momento en que Caras y Caretas, recién nacida, se posiciona políticamente.
