  image: images/sala-04/pieza-01.jpg
  descripcion: |-
    Revista de caricaturas políticas más longeva de la Argentina del siglo XIX, fundada por el dibujante francés Henri Stein en 1863 y publicada durante treinta años hasta 1893. El Mosquito instaló en Buenos Aires el modelo francés de la caricatura política semanal —Le Charivari, La Caricature— operando con dibujantes europeos formados en París y litografía como técnica principal. La revista atravesó toda la segunda mitad del siglo XIX argentino, desde los gobiernos liberales hasta la presidencia de Juárez Celman y la Revolución del Parque. Su cierre en 1893 dejó el espacio satírico libre para que Don Quijote (Sojo) y luego Caras y Caretas (Pellicer) lo ocuparan. El archivo retiene El Mosquito como matriz fundacional de la caricatura política argentina: el primer caso en que se importó masivamente el oficio europeo y se lo aplicó a la lucha política local.
