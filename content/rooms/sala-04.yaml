  descripcion: |-
    'Revista festiva, literaria, artística y de actualidades' fundada en Buenos Aires en 1898. Durante cuatro décadas fue la publicación gráfica más leída del Río de la Plata: combinó actualidad fotográfica, humor satírico, folletín, publicidad, ilustración y caricatura en una fórmula que reinventó el periodismo masivo argentino. Sus dibujantes —José María Cao, Manuel Mayol, Aurelio Giménez, Mario Zabataro, Charles Schultz— formaron la primera generación de profesionales de la imagen argentinos. La revista se imprimía en la Compañía Sud-Americana de Billetes de Banco, una de las imprentas industriales más equipadas de la ciudad, con equipos completos de grabado, tipografía, encuadernación, litografía y fundición. El archivo retiene Caras y Caretas como pieza-sistema: no es un objeto individual sino la primera infraestructura gráfica modernizada del Río de la Plata, que durante cuatro décadas produjo semanalmente el imaginario visual del país.
