    Letras de imprenta usadas para la composición del primer libro impreso en Córdoba, identificadas por Silverman y Garone Gravier como del estilo Garamond, comparables con la muestra de Conrad Berner de 1592, considerada la más fiel al diseño original del tipógrafo francés. El conjunto incluía un Texto gordo (c. 16 pt) para el prólogo, una Parangona chica (18 pt) para las felicitaciones y un Texto (14 pt) para las laudaciones. Los tipos no estaban gastados, lo que sugiere fundición reciente al momento del impreso, pero su llegada al taller cordobés —vía la Compañía de Jesús, no por los circuitos comerciales habituales— es imposible de reconstruir con precisión. Un detalle inquietante para el archivo: ni los punzones, ni las matrices, ni un solo tipo físico del taller cordobés sobrevivió a la expulsión jesuítica.
