  descripcion: |-
    Página interior del Laudationes Quinque, primer libro impreso íntegramente en territorio rioplatense. La composición revela una sofisticación inesperada para un taller de tan corta vida: las páginas dedicatorias siguen una proporción áurea (caja de 178 × 111 mm) con márgenes iguales superior e inferior, según los preceptos de Alonso Víctor de Paredes; las páginas del prólogo y las laudaciones adoptan en cambio un rectángulo raíz de dos, manteniendo la regla de duplicar el margen exterior respecto del interior. El registro entre recto y verso es prácticamente perfecto, dato imposible de notar en el facsímil de 1937. Las imágenes en alta resolución obtenidas en 2019 permiten estudiar por primera vez la composición y el detalle ornamental del libro, evidenciando que su impresor —probablemente con experiencia previa— operaba con criterios proyectuales explícitos.
  cita_textual: |-
    verificamos proporciones áureas, una tradición compositiva de la imprenta manual que se remonta a los tiempos de Gutenberg
  fuente: Diseña N° 18 (2021), figs. 7-8, 11
