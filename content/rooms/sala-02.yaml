    Periódico semanal fundado por Juan Hipólito Vieytes en septiembre de 1802 y publicado durante cinco años, hasta su interrupción definitiva por las Invasiones Inglesas. Alcanzó 218 números, lo que lo convierte en la publicación periódica de mayor continuidad del período colonial rioplatense. Difundió ideas iluministas avanzadas: fisiocracia, libre comercio, integración indígena, supresión del comercio de esclavos, educación de las masas, asistencia social. Cuando llegó la escasez tipográfica en 1805, Vieytes denunció públicamente que 'la escasez de letra con que se halla nuestra única imprenta hace imposible la edición de las noticias publicadas en pliego separado': una declaración que confirma que el cuello de botella material de la imprenta era, en sí mismo, una cuestión política. El archivo lo retiene como antecedente directo de la prensa revolucionaria.
