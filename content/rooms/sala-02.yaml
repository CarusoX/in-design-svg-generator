  descripcion: |-
    Material escolar y catequístico producido en serie por la Real Imprenta de Niños Expósitos para abastecer al virreinato. Cuando se otorgó la concesión a Silva y Aguiar en 1780, una de las condiciones del contrato fue la recolección obligatoria de todos los catones, cartillas y catecismos en circulación, para luego venderse por cuenta de la Casa de Expósitos. Esa operación —combinación de censura, monopolio fiscal y alfabetización— produjo durante tres décadas los textos con los que aprendieron a leer las primeras generaciones porteñas. Los impresos eran baratos, mal compuestos por la urgencia y descuidados en la lectura; pocos sobrevivieron. El archivo los retiene no por su excepcionalidad gráfica sino por lo contrario: son el grueso silencioso de una producción que casi nadie pensó digno de conservar y que, sin embargo, fue lo más leído del virreinato.
  cita_textual: |-
