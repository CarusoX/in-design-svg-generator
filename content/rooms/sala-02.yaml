    Primer libro impreso íntegramente en territorio rioplatense, producido por la imprenta jesuítica instalada en el Colegio de Monserrat de Córdoba a mediados del siglo XVIII. La obra reúne cinco panegíricos en latín dedicados a Ignacio Duarte y Quirós, fundador del colegio, y constituye un testimonio excepcional de la sofisticación tipográfica alcanzada en una imprenta periférica del imperio español. Tras la expulsión de los jesuitas en 1767 la imprenta fue desmantelada, y solo un ejemplar de esta edición sobrevive hoy en la Abadía de Montserrat (Cataluña), donde fue localizado en 2019 por Silverman y Garone Gravier. Los dos ejemplares que habían pertenecido a Córdoba —uno en el Colegio Monserrat, otro entre los franciscanos— desaparecieron sin rastro; el del Museo Mitre fue robado y reemplazado por un facsímil; el de la Biblioteca Nacional de Chile no aparece disponible.
