  image: images/sala-02/pieza-10.jpg
  descripcion: |-
    Conjunto de bandos, cartas y proclamas impresos por la Real Imprenta de Niños Expósitos durante las dos Invasiones Inglesas. La actividad fue inusualmente intensa para el taller: los pocos meses de 1806 y 1807 produjeron más material que en cualquier período comparable anterior, lo que llevó a Juan José Pérez (entonces administrador) a denunciar que las letras se habían desgastado más en ese intervalo que en las dos décadas previas. La pieza tiene un valor archivístico singular: el desgaste tipográfico es huella física de un episodio bélico. Cada papel impreso durante las Invasiones lleva inscripta en sus caracteres irregulares la prisa de un taller único bajo presión política. Los pliegos físicos sobreviven dispersos en archivos militares y privados; muchos circularon como objetos efímeros de propaganda y fueron descartados al día siguiente.
