  descripcion: |-
    Conjunto de tipos móviles utilizados durante los primeros años del único taller tipográfico que funcionó en el virreinato del Río de la Plata. Importados desde Europa y ya usados al momento de su llegada, los caracteres se desgastaron progresivamente al ser sometidos al clima húmedo de Buenos Aires, a tintas artesanales y a los apuros productivos del taller único. Cuando la Imprenta cerró en 1824, ningún ejemplar físico de estos tipos sobrevivió: solo los conocemos a través de la huella que dejaron sobre el papel. La reconstrucción digital realizada por Fabio Ares en 2010 —compuesta por una romana redonda, una cursiva y un conjunto de viñetas— recupera esa materialidad ausente trabajando sobre escaneos de impresos originales. La fuente conserva deliberadamente las marcas del desgaste, las irregularidades y los empastamientos, en una operación que asume la imperfección como rasgo identitario de la primera tipografía rioplatense.
