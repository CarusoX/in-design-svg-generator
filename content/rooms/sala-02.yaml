  descripcion: |-
    Primer periódico bilingüe inglés-español del Río de la Plata, impreso en Montevideo durante la ocupación británica de 1807. Su contenido combinaba avisos comerciales, noticias militares y artículos propagandísticos que prometían a los lectores locales las ventajas de la 'protección inglesa' frente a la 'opresión monárquica española'. Bradford instaló una imprenta moderna en hierro, una rareza absoluta para el Río de la Plata. Tras la capitulación inglesa, vendió todo el equipo a la Casa de Expósitos de Buenos Aires, que lo trasladó en la balandra Copiango el 29 de septiembre de 1807. La pieza tiene una doble vida archivística: como periódico —de circulación brevísima, alarmante para la Audiencia de Buenos Aires— y como prensa y tipos, que se convirtieron en el aparato productivo de la imprenta porteña durante la Revolución de Mayo.
