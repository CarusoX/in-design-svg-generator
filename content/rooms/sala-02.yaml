  descripcion: |-
    Prensa tipográfica manual conocida popularmente como 'Imprenta de la Patria'. Durante más de ocho décadas se sostuvo que era la prensa traída por los jesuitas al Colegio de Monserrat en 1764, trasladada a Buenos Aires por el virrey Vértiz en 1780 para fundar la Real Imprenta de Niños Expósitos y enviada finalmente a Salta en 1824. Sin embargo, en el siglo XVIII no existían aún las prensas de hierro, lo que vuelve materialmente imposible la atribución original. La pieza condensa así una doble condición de ausencia: la del objeto efectivamente fundacional —perdido o nunca conservado— y la del relato que durante décadas la nombró como tal. Permanece como uno de los pocos restos físicos vinculados a la primera imprenta porteña, y como testimonio de los modos en que el patrimonio gráfico latinoamericano se construye también a partir de atribuciones inciertas.
  cita_textual: |-
