  datos: 1958-1970 · Buenos Aires, Argentina
  image: images/sala-07/pieza-01.jpg
  descripcion: |-
    Conjunto de catálogos, afiches, programas y materiales gráficos del Instituto Torcuato Di Tella, especialmente del Centro de Artes Visuales y del Centro de Experimentación Audiovisual, dirigido en gran parte por el diseñador y escultor Juan Carlos Distéfano. Entre 1958 y su cierre forzado en 1970, el Di Tella fue el laboratorio de la vanguardia argentina: por ahí pasaron Marta Minujín, Roberto Plate, Oscar Bony, Alberto Greco, las experiencias del pop, el happening y el video. Su comunicación visual definió un lenguaje moderno argentino: tipografía suiza, geometría, blanco y negro, escala internacional. El archivo retiene la pieza como el caso paradigmático del 'Ulmismo' rioplatense, pero también como ejemplo de que la modernidad gráfica argentina existió, y fue cancelada cuando la política y el mercado dejaron de tolerarla.
