  datos: 1987-2007 · Buenos Aires, Argentina
  image: images/sala-07/pieza-05.jpg
  descripcion: |-
    Revista fundada y dirigida por Rubén Fontana entre 1987 y 2007, considerada hoy la publicación más influyente sobre tipografía en el mundo iberoamericano. Sus 67 números desplegaron debates sobre diseño tipográfico, historia, identidad, autores latinoamericanos y europeos, y formaron a una generación entera de diseñadores rioplatenses. La pregunta de Valdés de León sobre su 'destino final' —escrita justo cuando la revista estaba terminando su ciclo— condensa una verdad incómoda: en el campo del diseño latinoamericano, las publicaciones rara vez duran más allá del impulso de su director, y cuando se apagan dejan un vacío que ninguna institución viene a llenar. El archivo conserva la colección completa como excepción confirmadora de la regla.
