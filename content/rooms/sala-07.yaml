  titulo_pieza: Tapas de libros del Centro Editor de América Latina (CEAL)
  autor: Centro Editor de América Latina (dirección editorial de Boris Spivacow)
  datos: 1966-1995 · Buenos Aires, Argentina
  image: images/sala-07/pieza-02.jpg
  descripcion: |-
    Conjunto de tapas y diseños de colecciones producidos por el Centro Editor de América Latina, editorial fundada por Boris Spivacow en 1966 tras su renuncia a EUDEBA. CEAL publicó fascículos baratos, colecciones de literatura universal y argentina, historias visuales, capítulos de historia argentina y un sistema editorial que llegó a kioscos, escuelas y barrios donde nunca había llegado un libro. El diseño —firmado por equipos rotativos de jóvenes diseñadores— sostuvo durante tres décadas una idea radical: que el libro popular podía tener calidad gráfica sin disfrazarse de objeto de lujo. La dictadura militar incineró parte del fondo en 1980 (el famoso 'tendal de Sarandí') y el cierre llegó en 1995 por quiebra. El archivo conserva las tapas como testigos de un proyecto editorial que la dictadura no logró aniquilar pero sí mutilar.
