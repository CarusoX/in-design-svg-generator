- cabecera_id: Sala VII · Pieza 07
  cabecera_sub: L057
  tipo: Familia tipográfica digital de patrimonio
  titulo_pieza: Tipografía digital Expósitos (reconstrucción de Fabio Ares)
  autor: Fabio Ares / Dirección General Patrimonio e Instituto Histórico (Gobierno CABA)
  datos: 2010 (en el marco del Bicentenario) · Buenos Aires, Argentina
  image: images/sala-07/pieza-07.jpg
  descripcion: |-
    Reconstrucción digital de los tipos romanos antiguos, cursivos y vinetas usados durante el período virreinal por la Real Imprenta de Niños Expósitos. Producida por Fabio Ares en el marco del Bicentenario de la Revolución de Mayo, la familia se compone de una romana redonda, una cursiva y un conjunto de viñetas tipográficas y filetes. El método partió de los impresos producidos entre 1780 y 1810: escaneo a 600-1200 dpi, retoque manual, vectorización, edición tipográfica y empaquetado en formatos PostScript y TrueType. Las letras conservan deliberadamente las marcas del desgaste, los empastamientos y la irregularidad del color tipográfico que caracterizaban a los originales. La fuente se distribuye gratuitamente para usos educativos y culturales, con la única condición de mencionar la fuente. El archivo la conserva como ejemplo paradigmático de reconstrucción digital del patrimonio gráfico latinoamericano.
  cita_textual: reconstrucción digital de los primeros caracteres y ornamentos utilizados
