  autor: Ruth Corcuera
  datos: 1987 · Buenos Aires, Argentina
  image: images/sala-07/pieza-06.jpg
  descripcion: |-
    Libro publicado por Ruth Corcuera en 1987, pionero en la investigación sistemática del tejido popular andino argentino y sus vínculos con producciones contemporáneas. Corcuera trabajó durante décadas con tejedoras del NOA registrando técnicas, motivos, simbología y cosmogonías textiles. La operación de su libro es de archivo en sentido estricto: documenta, cataloga y conserva textualmente lo que el campo material estaba perdiendo. El archivo lo retiene como ejemplo de operación archivística femenina argentina del siglo XX: una mujer investigadora documenta la producción de mujeres tejedoras, en un sistema disciplinar que durante décadas no se interesó por ninguna de las dos. La obra abrió camino a la inclusión del textil andino en discusiones internacionales sobre diseño y forma; sus categorías siguen siendo de referencia.
