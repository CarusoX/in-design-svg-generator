  descripcion: |-
    Cinco ediciones consecutivas del Anuario de la Asociación de Diseñadores Gráficos de Buenos Aires, autoeditadas por sus socios entre 1980 y 1985, en plena dictadura militar y luego en los primeros años democráticos. Los anuarios documentan la producción gráfica argentina del momento —identidades, editorial, afiches, ilustración— en una operación de autoarchivo gremial que no se había intentado antes y que no se repitió después. La ADG se disolvió 'corroída por mezquinas rencillas intestinas', según Valdés de León, y con ella desaparecieron tanto el anuario como la única exposición nacional e internacional de diseño gráfico que se montó en el MAMBA. El archivo guarda los cinco volúmenes como retrato de una institución que no sobrevivió a sí misma.
