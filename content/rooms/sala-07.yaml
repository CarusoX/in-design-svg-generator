  autor: Raúl Shakespeare y Ronald Shakespeare
  datos: 1971-1990 · Buenos Aires, Argentina
  image: images/sala-07/pieza-03.jpg
  descripcion: |-
    Sistema de señalización urbana de la Ciudad de Buenos Aires diseñado por el estudio Shakespeare a partir de 1971, y posteriormente extendido a autopistas, hospitales, aeropuertos y subterráneos. Los Shakespeare —hermanos de origen británico— resolvieron por primera vez en escala metropolitana sudamericana el problema de la legibilidad a velocidad: tipografía sans-serif normalizada, pictogramas reducidos a su esquema mínimo, sistema cromático estable. Buena parte de las señales todavía en uso hoy en Buenos Aires son herederas directas de ese diseño. El archivo la incluye como una pieza paradójica: está literalmente en la calle, sometida al desgaste cotidiano y al recambio inadvertido, y precisamente por eso es de las menos conservadas. Cada vez que un cartel se reemplaza, una versión del Buenos Aires gráfico moderno desaparece sin que nadie tome nota.
  cita_textual: Eduardo Giménez y Raúl y Ronald Shakespeare
