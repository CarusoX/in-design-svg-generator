  tipo: Impreso patriótico / partitura
  titulo_pieza: Marcha Patriótica (Himno Nacional Argentino, primera impresión)
  autor: Vicente López y Planes (letra); Blas Parera (música); Real Imprenta de Niños Expósitos
  datos: 1813 · Buenos Aires, Argentina
  image: images/sala-03/pieza-04.jpg
  descripcion: |-
    Primera impresión tipográfica de los versos de la 'Marcha Patriótica' de Vicente López y Planes, aprobada por la Asamblea del Año XIII y consagrada después como Himno Nacional Argentino. La edición fue compuesta en la Real Imprenta de Niños Expósitos con las mismas letras gastadas que venían imprimiendo periódicos, bandos y proclamas desde 1780. La versión original tenía nueve estrofas; el uso oficial fue reduciéndolas hasta el extracto actual de una sola estrofa y el coro. La pieza archivada no es sólo el texto del himno: es la primera vez que un símbolo nacional argentino se materializa por la tipografía. El archivo la incluye como ejemplo de cómo la república naciente se imprime en la misma tipografía colonial: lo nuevo se publica con las letras de lo viejo.
  cita_textual: |-
    En 1813 se imprimiría otro hito dentro de los impresos de Expósitos, los versos de la Marcha Patriótica
