- cabecera_id: Sala III · Pieza 05
  cabecera_sub: L019
  tipo: Almanaque cívico
  titulo_pieza: Almanak patriótico de Buenos Ayres, para el año décimo de nuestra libertad
  autor: Imprenta de la Independencia
  datos: 1819 · Buenos Aires, Argentina
  image: images/sala-03/pieza-05.jpg
  descripcion: |-
    Primer almanaque rioplatense en abandonar el régimen estrictamente religioso del calendario virreinal. Publicado en 1819 por la Imprenta de la Independencia para conmemorar el décimo año de la Revolución de Mayo, mantiene la estructura del almanaque colonial —festividades, santos, calendario lunar— pero incorpora un repertorio nuevo: nómina de edificios públicos y religiosos de Buenos Aires, fechas célebres patrias, número de habitantes de la ciudad y alrededores. La operación es notable: el género que durante tres décadas había servido para sincronizar a la sociedad colonial con el calendario eclesiástico se transforma en herramienta de inventario de la república recién nacida. El archivo lo conserva como la primera evidencia material de que la Revolución de Mayo no sólo cambió el gobierno: cambió el tipo de información que un libro doméstico necesitaba ofrecer.
