  tipo: Libro político traducido
  titulo_pieza: El Contrato Social (edición de Mariano Moreno)
  autor: Jean-Jacques Rousseau (autor); traducción y prólogo de Mariano Moreno
  datos: 1810 · Buenos Aires, Argentina
  image: images/sala-03/pieza-03.jpg
  descripcion: |-
    Edición castellana del Contrato Social impresa en la Real Imprenta de Niños Expósitos por orden de Mariano Moreno, secretario de la Primera Junta. La operación es doble: por un lado, Moreno traduce y publica el texto rousseauniano para justificar la legitimidad del gobierno revolucionario; por otro, suprime los capítulos sobre religión, considerándolos ofensivos para una población católica recién liberada del orden colonial. El libro circuló profusamente en escuelas y juntas locales del interior, y se convirtió en uno de los pilares del imaginario constitucional rioplatense. Pocos ejemplares de la primera edición sobreviven en perfectas condiciones; la mayoría fueron leídos hasta el desgaste. El archivo lo retiene como ejemplo de la primera edición política latinoamericana que asumió explícitamente que traducir era reescribir.
