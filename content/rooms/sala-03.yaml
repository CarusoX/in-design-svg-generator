  descripcion: |-
    Periódico fundado por Manuel Belgrano el 3 de marzo de 1810 —apenas dos meses antes de la Revolución de Mayo— y continuado hasta abril de 1811. Vehículo de las ideas económicas e ilustradas de Belgrano: industrialización, agricultura científica, educación pública, libertad de comercio. Cuando se produjo la Revolución, el periódico cambió de tono sin cambiar de imprenta: la Real Imprenta de Niños Expósitos siguió componiéndolo con las mismas letras gastadas y bajo el nuevo Cabildo. El Correo de Comercio condensa así un momento bisagra: usa el aparato técnico de la imprenta colonial para imprimir el contenido del orden que la está clausurando. El archivo retiene la pieza como demostración de que la materialidad gráfica resistió al cambio político: la misma tinta, el mismo papel, los mismos tipos —otro contenido.
