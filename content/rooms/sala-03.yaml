- cabecera_id: Sala III · Pieza 06
  cabecera_sub: L020
  tipo: Almanaque comercial / guía urbana
  titulo_pieza: Almanaques de comercio Blondel
  autor: Blondel (editor)
  datos: 1826-1836 · Buenos Aires, Argentina
  image: images/sala-03/pieza-06.jpg
  descripcion: |-
    Serie de almanaques comerciales publicados en Buenos Aires durante la década en que se consolidó el comercio porteño post-independencia. Combinaban la estructura tradicional del almanaque (calendario, festividades, fases lunares) con secciones publicitarias y guías de comercios, profesionales, librerías y servicios. Para los historiadores del libro como Alejandro Parada, los almanaques Blondel constituyen 'la fuente de información más importante para identificar las librerías de la época': una operación archivística involuntaria, donde una publicación pensada para uso cotidiano se vuelve siglo y medio más tarde el único registro disponible de un sector entero de la cultura impresa portenia. El archivo los retiene como ejemplo perfecto del valor patrimonial paradójico de los impresos utilitarios: lo que se imprimió para ser tirado a fin de año es lo que termina conservando la memoria de todo lo demás.
  cita_textual: |-
    los almanaques de comercio Blondel (1826-1836)... constituyen la fuente de información más importante para identificar las librerías de la época
