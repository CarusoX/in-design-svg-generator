  tipo: Periódico revolucionario
  titulo_pieza: La Gazeta de Buenos Ayres
  autor: Mariano Moreno (impulsor); Manuel Belgrano y Juan José Castelli (redactores iniciales)
  datos: '1810 (primer número: 7 de junio) · Buenos Aires, Argentina'
  image: images/sala-03/pieza-02.jpg
  descripcion: |-
    Órgano oficial de la Primera Junta de Gobierno, fundado por iniciativa de Mariano Moreno y publicado por primera vez el 7 de junio de 1810. Impreso en la Real Imprenta de Niños Expósitos, su número uno se convirtió en el documento gráfico más reproducido del repertorio revolucionario argentino: la Gazeta es la primera evidencia material de que la independencia rioplatense se hizo también con tinta de Buenos Aires. La fecha del primer número se conmemora hoy como Día del Periodismo en Argentina. Lo paradójico, para el archivo, es que el órgano fundacional del periodismo nacional se imprimió en la misma prensa que durante treinta años había impreso bandos virreinales: hasta 1815 no se permitió que ninguna otra imprenta operara en Buenos Aires.
