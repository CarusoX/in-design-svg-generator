- cabecera_id: Sala I · Pieza 01
  cabecera_sub: L001
  tipo: Diseño textil tradicional
  titulo_pieza: Tejidos populares andinos del NOA
  autor: Tejedoras anónimas de Santiago del Estero y Catamarca
  datos: Pre-hispánico - siglo XX · Santiago del Estero, Catamarca, Argentina
  image: images/sala-01/pieza-01.jpg
  descripcion: |-
    Conjunto de patrones, técnicas y formas del tejido popular andino producido en el Noroeste argentino desde el período prehispánico hasta el siglo XX. En Santiago del Estero predominan los patrones más codificados, repetitivos, transmitidos por línea materna; en Catamarca las creaciones son más libres e iconoclastas. La tradición se transmite oralmente, sin manuales ni academias: el telar es el dispositivo de transmisión generacional. Cada pieza condensa la línea genealógica de quien la teje. La operación cultural fue invisibilizada durante siglos por la categorización europea —'artesanía', 'folklore', 'artesanías populares'— pero, como señala Valdés de León, esa misma categorización es la que impide reconocer el carácter proyectual de la operación. El archivo retiene la pieza como ejemplo de un diseño popular latinoamericano que existió continuamente durante seis siglos y que el campo disciplinar académico apenas empezó a estudiar en los últimos cincuenta años.
  cita_textual: |-
    En Santiago del Estero —por sus patrones— y Catamarca —creaciones más iconoclastas—, el rol de las tejedoras es crucial
  fuente: Libro Corcuera (1987); MNAD Argentina; archivos etnográficos
  source_id: L001
  contexto_historico: Cultura material andina. Tensión entre lo autóctono y la modernización.
  estado_conservacion: En riesgo. Tradición viva en algunas comunidades; objetos dispersos
    en museos
