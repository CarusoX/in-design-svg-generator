- cabecera_id: Sala I · Pieza 02
  cabecera_sub: L002
  tipo: Sistemas protoescriturales y de registro
  titulo_pieza: Códices, glifos y quipus precolombinos
  autor: Culturas mesoamericanas y andinas (anónimos)
  datos: Antes del siglo XVI · Tenochtitlán, Cuzco, Petén, México, Perú, Guatemala
  image: images/sala-01/pieza-02.jpg
  descripcion: |-
    Conjunto de sistemas de comunicación visual y registro de información desarrollados por las sociedades originarias americanas: los códices pintados mesoamericanos (mayas, mixtecos, aztecas), los glifos epigráficos y los quipus incas, dispositivos de cordeles anudados que codificaban información administrativa, contable y posiblemente narrativa. Valdés de León los reivindica como demostración material de la existencia de un Diseño originario funcional a las demandas de sociedades complejas, frente a la categoría museística de 'arte precolombino' que los desgaja de su trama social y los reduce a objeto contemplativo. La mayor parte de los códices fue quemada por los frailes de la Contrarreforma; el conocimiento del quipu se perdió casi por completo y aún hoy se discute si se trataba de un sistema completo de escritura.
  cita_textual: |-
    los sistemas protoescriturales —glifos, códices, quipus— constituyen la irrevocable demostración material de la existencia de un Diseño originario
  fuente: Codex Mendoza (Bodleian); Códice Florentino (Laurenziana); quipus en Museo Larco
  source_id: L002
  contexto_historico: Mesoamérica clásica y postclásica; Tawantinsuyu. Conquista española.
  estado_conservacion: |-
    Mayoritariamente destruidos en la Conquista; pocos códices sobreviven (Bodleian, Vaticana, etc.); quipus dispersos en museos
