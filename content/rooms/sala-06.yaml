  tipo: Afiche político / propaganda visual
  titulo_pieza: Afiche 'Campesino rompiendo las cadenas' (SIPP)
  autor: Anónimo / SIPP
  datos: c. 1946-1948 · Buenos Aires, Argentina
  image: images/sala-06/pieza-03.jpg
  descripcion: |-
    Afiche del primer peronismo donde un campesino aparece en una demostración de fuerza y destreza física rompiendo cadenas, con la mano derecha empuñando una tacuara que sostiene la bandera argentina. La composición rompe la perspectiva moderna: el pie del personaje avanza sobre el espectador, apoyándose sobre la leyenda del afiche; el cuerpo se proyecta hacia afuera del cuadro. En segundo plano, un jinete con atuendos tradicionales monta un caballo presto a saltar. La estética anticipa por una década el trabajo del pintor Ricardo Carpani y dialoga directamente con el muralismo mexicano de Siqueiros y el realismo socialista soviético. El gesto de romper las cadenas remite explícitamente a un verso central del Himno Nacional Argentino. El archivo retiene la pieza como afiche emblema de la primera fase peronista: justicia social y modernización industrial fundidas en una iconografía de fuerza popular.
  cita_textual: |-
    un campesino en una demostración de fuerza y destreza física... rompe las cadenas que lo ataban
  fuente: Archivo Fotográfico del Archivo Intermedio (AGN)
  source_id: L046
