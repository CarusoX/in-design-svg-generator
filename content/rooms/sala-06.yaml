  tipo: Identidad de producto / diseño industrial peronista
  titulo_pieza: Identidad de marca IAME (motocicleta Puma)
  autor: IAME (Industrias Aeronáuticas y Mecánicas del Estado), Córdoba
  datos: c. 1952 · Córdoba, Argentina
  image: images/sala-06/pieza-07.jpg
  descripcion: |-
    Motocicleta Puma producida por IAME a partir de c. 1952, junto a un programa completo de identidad de producto: logo, denominación, publicidad, manuales y postventa. El nombre 'Puma' integraba el programa simbólico del peronismo industrial, que daba a sus productos nombres telúricos (Pampa, Justicialista, Rastrojero, Puma) para inscribirlos en un imaginario nacional vinculado al territorio y la fauna. La marca circuló masivamente en la Argentina de los 50 y luego desapareció cuando la planta IAME fue cerrada en 1980 por la dictadura militar. El archivo retiene la identidad como pieza paradigmática del diseño de producto peronista: no sólo el objeto industrial sino el sistema gráfico que lo nombraba, lo presentaba al consumidor y lo inscribía en el imaginario soberano del Estado productor.
  cita_textual: |-
    fabricó las motocicletas 'Puma' (c. 1952), los tractores 'Pampa' (c. 1952) y los automóviles deportivos 'Justicialista' (1953)
