  tipo: Afiche político / propaganda visual
  titulo_pieza: Afiche 'Tocando el sol' (turismo social peronista)
  autor: Anónimo / SIPP
  datos: c. 1950-1955 · Buenos Aires, Argentina
  image: images/sala-06/pieza-06.jpg
  descripcion: |-
    Afiche caricaturizado donde una figura humana estira el brazo hasta casi tocar el sol, sonriendo de manera jocosa y guiñando un ojo en gesto de complicidad. La operación rompe con la solemnidad de los afiches anteriores y entra en el registro del humor popular. La iconografía es leve pero el mensaje es radical: el acceso de los sectores populares al derecho a las vacaciones y a los enclaves geográficos antes reservados a las élites. La caricatura mira hacia abajo y hacia atrás —no al espectador— en una operación de complicidad horizontal entre pares. Al fondo, un edificio en el estilo arquitectónico clásico del peronismo (hoteles sindicales, sanatorios sociales) da solidez material al mensaje. El archivo retiene la pieza como ejemplo del momento en que la propaganda peronista deja la épica y entra al humor: el régimen ya estabilizado puede burlarse de los códigos pasados de las élites.
  cita_textual: |-
    presenta una imagen caricaturizada, al parecer ingenua y risueña... la caricatura de una figura humana estira su brazo hasta casi tocar el sol
  fuente: AGN. Reproducido en Gabriel Hernán (2011)
