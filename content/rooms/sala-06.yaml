  titulo_pieza: Afiche 'Obrero-campesino cargando una locomotora' (SIPP, nacionalización ferroviaria)
  autor: Anónimo / SIPP
  datos: c. 1948 · Buenos Aires, Argentina
  image: images/sala-06/pieza-04.jpg
  descripcion: |-
    Afiche producido alrededor de 1948, año de la nacionalización de los ferrocarriles. La imagen presenta una hibridación estética y de vestimenta entre un obrero y un campesino —tez morena, fisonomía no europea— cargando sobre sus hombros el peso de una locomotora. La iconografía es deliberada: el sujeto que sostiene la nueva propiedad estatal del sistema ferroviario no es el inmigrante europeo blanco asociado al ferrocarril privado británico, sino el 'cabecita' criollo que el peronismo había incorporado a la escena política. El archivo retiene la pieza como ejemplo paradigmático del programa simbólico de la propaganda peronista: la nacionalización de un activo material (los ferrocarriles) se acompaña de una nacionalización del cuerpo del trabajador en la iconografía oficial. La fisonomía propuesta no replica las prescripciones estéticas europeizantes; las disputa.
  cita_textual: |-
    hibridación estética y de vestimentas entre un obrero y un campesino... cargando el peso de una locomotora
  fuente: AGN. Reproducido en Gené (2005)
