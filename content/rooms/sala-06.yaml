  descripcion: |-
    Conjunto de emblemas y aplicaciones gráficas de las empresas estatales creadas o estatizadas durante el primer peronismo: Fabricaciones Militares (1941), Acindar (1942), Techint (1945), Gas del Estado (1945), Agua y Energía (1947), Ferrocarriles Argentinos (1948), Teléfonos del Estado (1948), Aerolíneas Argentinas (1949), IAME (1952), Dirección Nacional de Industrias del Estado (DINIE). Los emblemas exhiben reminiscencias de los escudos militares: ovalado, simétrico, jerárquico, con tipografía mayúscula sólida y elementos heráldicos simplificados. La operación gráfica era coherente: cada empresa tenía un emblema propio, pero todos compartían un código visual que las identificaba como pertenecientes al programa del Estado nacional. El archivo retiene la pieza como sistema: la primera vez en la historia argentina que el Estado opera con coherencia gráfica explícita en su patrimonio empresario.
  cita_textual: |-
