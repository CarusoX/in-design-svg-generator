  tipo: Afiche político / propaganda visual
  titulo_pieza: Afiche 'Familia rural y perfil apoteótico de Perón'
  autor: Anónimo / SIPP
  datos: c. 1950-1955 · Buenos Aires, Argentina
  image: images/sala-06/pieza-05.jpg
  descripcion: |-
    Afiche de la segunda fase peronista donde una familia rural ocupa el primer plano (hombre sosteniendo una pala) y el perfil del líder aparece al fondo en tono apoteótico con tonos amarillos. La elección iconográfica es deliberada: el perfil presidencial —y no el rostro frontal— sugiere cercanía con el espectador y con la familia, integrándolo a la escena en lugar de imponerse desde arriba. El crítico Gabriel Hernán describe la operación como 'plebeyización' conceptual de la imagen presidencial: la figura del Jefe de Estado se acerca al nivel de la familia trabajadora y del trabajo físico. La pieza sintetiza el cambio de la propaganda peronista hacia 1950: menos retórica movimientista de masas, más composición intimista del régimen como tutela paternal sobre la familia popular.
  cita_textual: |-
    aparece el perfil de Perón en tono apoteótico y con tonos amarillos... lo que se supone es una familia rural
  fuente: AGN. Reproducido en Gabriel Hernán (2011), Gené (2005)
