  tipo: Corpus propagandístico estatal
  titulo_pieza: Corpus de afiches de la SIPP (Subsecretaría de Información, Prensa y Propaganda)
  autor: Anónimos / SIPP del Estado Argentino
  datos: 1946-1955 · Buenos Aires, Argentina
  image: images/sala-06/pieza-02.jpg
  descripcion: |-
    Conjunto de afiches producidos por la Subsecretaría de Información, Prensa y Propaganda durante los dos primeros gobiernos de Perón. La SIPP centralizó la producción propagandística no sólo de todos los ministerios del gobierno nacional sino también de entidades autárquicas y de la Fundación Eva Perón a través de cinco direcciones: Espectáculos Públicos (área cinematográfica), Difusión, Publicidad, Prensa y Radiodifusión. La operación gráfica del corpus combinó la estética del realismo socialista, el muralismo mexicano y la caricatura popular en una sintaxis novedosa que recuperaba prácticas y costumbres de los sectores populares previamente estigmatizadas. Tras la caída del peronismo, el Decreto 4161/56 del 5 de marzo de 1956 prohibió la circulación de todo el material gráfico del régimen depuesto. El archivo retiene el corpus como caso paradigmático de patrimonio gráfico legalmente prohibido: las piezas que sobreviven hoy lo hacen porque alguien las escondió antes de ser destruidas.
  cita_textual: |-
    afiches generados desde la Subsecretaría de Información, Prensa y Propaganda (SIPP) durante el período comprendido por los años 1946 y 1955
